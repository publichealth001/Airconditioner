<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Money Cloud 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS: ดีไซน์พาสเทลมินิมอล ลื่นไหล สไตล์ iOS */
        :root {
            --bg-color: #f7f9fc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --primary: #a8b2ff;
            --income: #b5e48c;
            --expense: #ffb4a2;
            --text-dark: #4a4e69;
            --delete-btn: #ffb4b4;
            --edit-btn: #ffd166;
            --warning: #ffcb77;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: var(--text-dark);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-top: 20px;
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 20px;
        }

        .balance-card {
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }

        .balance-amount {
            font-size: 34px;
            font-weight: 600;
            margin: 5px 0 0 0;
        }

        /* ⚠️ BUDGET CARD STYLES */
        .budget-card {
            background: white;
            border-radius: 22px;
            padding: 18px;
            margin-bottom: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.03);
        }

        .budget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .budget-input-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #f0f2f5;
            padding: 4px 10px;
            border-radius: 12px;
            max-width: 140px;
        }

        .budget-input-wrapper span {
            font-size: 13px;
            color: #888;
        }

        #budget-limit {
            width: 100%;
            padding: 2px;
            background: transparent;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Prompt', sans-serif;
            border: none;
            color: var(--text-dark);
            outline: none;
            text-align: right;
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--income);
            border-radius: 10px;
            transition: width 0.5s ease, background-color 0.3s ease;
        }

        .budget-stats {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #7a7f9a;
        }

        /* 📊 CHART CONTAINER STYLES (ปรับจัดกึ่งกลางและขยายขนาด) */
        .chart-container {
            background: white;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .chart-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 15px;
            align-self: flex-start;
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
            max-width: 260px; /* ขยายขนาดเพิ่มขึ้นเล็กน้อยให้เต็มตากำลังดี */
            height: 260px;
            margin: 0 auto;  /* บังคับให้อยู่กึ่งกลางกล่องในฝั่ง CSS */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #expenseChart {
            width: 100% !important;
            height: 100% !important;
        }

        .form-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        #type { flex: 1; }
        #amount { flex: 1.5; }

        input, select {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: #f0f2f5;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, select:focus {
            background: #fff;
            box-shadow: 0 0 0 2px var(--primary);
        }

        .auto-changed {
            animation: highlightChange 0.5s ease;
        }
        @keyframes highlightChange {
            0% { transform: scale(1); box-shadow: 0 0 0 0 var(--primary); }
            50% { transform: scale(1.02); box-shadow: 0 0 0 4px var(--primary); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 var(--primary); }
        }

        #note {
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: var(--primary);
            color: white;
            font-family: 'Prompt', sans-serif;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        button:active { transform: scale(0.95); }

        #cancel-btn {
            background: #cbd5e1;
            color: #64748b;
            display: none;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h3 { font-size: 18px; }

        #month-filter {
            width: auto;
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .history-list {
            list-style: none;
            max-height: 280px;
            overflow-y: auto;
        }

        .history-list::-webkit-scrollbar { width: 5px; }
        .history-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: white;
            border-radius: 20px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .item.plus { border-left: 6px solid var(--income); }
        .item.minus { border-left: 6px solid var(--expense); }

        .item.fade-out {
            opacity: 0;
            transform: scale(0.9) translateY(-10px);
            margin-bottom: -50px;
            padding-top: 0;
            padding-bottom: 0;
            height: 0;
            overflow: hidden;
        }

        .item-details {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding-right: 10px;
        }

        .item-note { word-break: break-word; font-weight: 400; }
        .item-date { font-size: 11px; color: #a0a5ba; margin-top: 2px; }
        .item-right { display: flex; align-items: center; gap: 8px; }
        .item-amount { font-weight: 600; white-space: nowrap; margin-right: 4px; }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            width: auto;
        }
        
        .action-btn:active { transform: scale(0.8); }
        .delete-btn-icon { color: var(--delete-btn); }
        .delete-btn-icon:hover { color: #ff5c5c; }
        .edit-btn-icon { color: #cbd5e1; }
        .edit-btn-icon:hover { color: #94a3b8; }

        .no-data { text-align: center; color: #a0a5ba; padding: 20px; font-size: 14px; }

        .toast-container {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 14px 28px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 15px;
            z-index: 9999;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .toast-container.show { top: 25px; opacity: 1; }
        .toast-success { border-left: 5px solid var(--income); color: #52793d; }
        .toast-info { border-left: 5px solid var(--primary); color: #5b65b3; }
        .toast-delete { border-left: 5px solid var(--expense); color: #c26753; }
        .toast-warning { border-left: 5px solid #ff5c5c; color: #b03a3a; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media screen and (max-width: 480px) {
            .container { padding: 25px 20px; border-radius: 30px; }
            .balance-amount { font-size: 28px; }
            .form-group { flex-direction: column; gap: 10px; }
            #type, #amount { width: 100%; }
            input, select, button { padding: 14px; font-size: 15px; }
            .item { padding: 14px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast-container">
        <span id="toast-icon">✨</span>
        <span id="toast-text">ทำรายการสำเร็จ!</span>
    </div>

    <div class="container">
        <h1>My Money Cloud 💸</h1>
        
        <div class="balance-card">
            <div id="balance-title">ยอดเงินคงเหลือ (ทั้งหมด)</div>
            <div class="balance-amount" id="balance">฿0.00</div>
        </div>

        <div class="budget-card">
            <div class="budget-header">
                <span>งบประมาณเดือนนี้ 🎯</span>
                <div class="budget-input-wrapper">
                    <span>฿</span>
                    <input type="number" id="budget-limit" min="0" value="5000" placeholder="ตั้งงบ">
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="budget-progress"></div>
            </div>
            <div class="budget-stats">
                <span id="budget-used">ใช้ไป: ฿0.00</span>
                <span id="budget-percent">0%</span>
            </div>
        </div>

        <div class="chart-container" id="chart-section" style="display: none;">
            <div class="chart-title">สัดส่วนรายจ่ายเดือนนี้ 🍕</div>
            <div class="chart-wrapper">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

        <form id="transaction-form">
            <div class="form-group">
                <select id="type">
                    <option value="minus">รายจ่าย 📤</option>
                    <option value="plus">รายรับ 📥</option>
                </select>
                <input type="number" id="amount" placeholder="จำนวนเงิน" required min="1" step="any">
            </div>
            
            <input type="text" id="note" list="note-suggestions" placeholder="จดไว้หน่อยว่าค่าอะไร..." required autocomplete="off">
            <datalist id="note-suggestions"></datalist>

            <div class="btn-group">
                <button type="submit" id="submit-btn">บันทึกข้อมูล ✨</button>
                <button type="button" id="cancel-btn">ยกเลิก ❌</button>
            </div>
        </form>

        <div class="history-header">
            <h3>ประวัติรายการ</h3>
            <select id="month-filter">
                <option value="all">ทั้งหมด 📅</option>
            </select>
        </div>

        <ul class="history-list" id="list">
            <div class="no-data">กำลังโหลดข้อมูล... 🚀</div>
        </ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdnDcProI1UFW2a9eGiUJbLYmI7ihM1XQ",
            authDomain: "boonsomair-3f5b0.firebaseapp.com",
            projectId: "boonsomair-3f5b0",
            storageBucket: "boonsomair-3f5b0.firebasestorage.app",
            messagingSenderId: "831800219771",
            appId: "1:831800219771:web:97243e82b452a14e0a2ade"
        };

        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, {
            localCache: persistentLocalCache({
                tabManager: persistentMultipleTabManager()
            })
        });
        
        const transactionsRef = collection(db, "transactions");

        const form = document.getElementById('transaction-form');
        const balanceDisplay = document.getElementById('balance');
        const balanceTitle = document.getElementById('balance-title');
        const list = document.getElementById('list');
        const datalist = document.getElementById('note-suggestions');
        const monthFilter = document.getElementById('month-filter');
        const typeSelect = document.getElementById('type');
        const amountInput = document.getElementById('amount');
        const noteInput = document.getElementById('note');
        
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const toast = document.getElementById('toast');

        // Budget DOM Elements
        const budgetInput = document.getElementById('budget-limit');
        const budgetProgress = document.getElementById('budget-progress');
        const budgetUsedLabel = document.getElementById('budget-used');
        const budgetPercentLabel = document.getElementById('budget-percent');
        const chartSection = document.getElementById('chart-section');

        let transactions = [];
        let editId = null;
        let expenseChart = null;

        budgetInput.value = localStorage.getItem('monthly_budget') || 5000;

        budgetInput.addEventListener('input', function() {
            let val = parseFloat(this.value);
            if (isNaN(val) || val < 0) val = 0;
            localStorage.setItem('monthly_budget', val);
            updateUI();
        });

        // ==========================================
        // 🧠 ระบบ SMART AUTO-FILL
        // ==========================================
        const expenseKeywords = ["ค่า", "ซื้อ", "จ่าย", "ช้อป", "บิล", "หนี้", "โอนให้", "เติมเงิน"];
        const incomeKeywords = ["รับ", "เงินเดือน", "โอนเข้า", "ขาย", "ได้เงิน", "ถูกหวย", "เงินทอน"];

        noteInput.addEventListener('input', function() {
            const text = this.value.trim();
            if (!text) return;

            let newType = typeSelect.value;
            let foundPastMatch = false;

            const pastTx = transactions.find(t => t.note === text);

            if (pastTx) {
                amountInput.value = pastTx.amount;
                newType = pastTx.type;
                foundPastMatch = true;
            } else {
                if (expenseKeywords.some(keyword => text.includes(keyword))) {
                    newType = "minus";
                } else if (incomeKeywords.some(keyword => text.includes(keyword))) {
                    newType = "plus";
                }
            }

            if (newType !== typeSelect.value) {
                typeSelect.value = newType;
                typeSelect.classList.remove('auto-changed');
                void typeSelect.offsetWidth; 
                typeSelect.classList.add('auto-changed');
            }

            if (foundPastMatch) {
                amountInput.classList.remove('auto-changed');
                void amountInput.offsetWidth;
                amountInput.classList.add('auto-changed');
            }
        });

        const defaultSuggestions = [
            "ชาไข่มุก 🧋", "หมูกระทะ 🥓", "ค่าเดินทาง 🚝", 
            "ช้อปปิ้ง 🛍️", "ค่าเน็ต/โทรศัพท์ 📱", "เงินเดือน 💰", 
            "ขนมจุกจิก 🍫", "กาแฟ ☕", "โอนให้เพื่อน 💸"
        ];

        function showToast(text, type = 'success') {
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');
            
            toastText.innerText = text;
            toast.className = "toast-container show";
            
            if (type === 'success') {
                toast.classList.add('toast-success');
                toastIcon.innerText = '🎉';
            } else if (type === 'info') {
                toast.classList.add('toast-info');
                toastIcon.innerText = '🛠️';
            } else if (type === 'delete') {
                toast.classList.add('toast-delete');
                toastIcon.innerText = '🗑️';
            } else if (type === 'warning') {
                toast.classList.add('toast-warning');
                toastIcon.innerText = '⚠️';
            }

            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function updateSuggestions() {
            datalist.innerHTML = '';
            const pastNotes = transactions.map(t => t.note);
            const allSuggestions = [...new Set([...defaultSuggestions, ...pastNotes])];
            allSuggestions.forEach(note => {
                const option = document.createElement('option');
                option.value = note;
                datalist.appendChild(option);
            });
        }

        function updateMonthFilterOptions() {
            const currentSelection = monthFilter.value;
            monthFilter.innerHTML = '<option value="all">ทั้งหมด 📅</option>';
            
            const months = transactions.map(t => {
                const d = new Date(t.date);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            });
            const uniqueMonths = [...new Set(months)].sort().reverse();

            uniqueMonths.forEach(m => {
                const [year, month] = m.split('-');
                const dateObj = new Date(year, month - 1);
                const monthName = dateObj.toLocaleDateString('th-TH', { month: 'short', year: 'numeric' });
                
                const option = document.createElement('option');
                option.value = m;
                option.innerText = monthName;
                monthFilter.appendChild(option);
            });

            if ([...monthFilter.options].some(o => o.value === currentSelection)) {
                monthFilter.value = currentSelection;
            } else {
                monthFilter.value = 'all';
            }
        }

        // ==========================================
        // 📊 ฟังก์ชันวาดกราฟวงกลม (จัดวางกึ่งกลางอย่างสมบูรณ์)
        // ==========================================
        function renderExpenseChart(expenseList) {
            if (expenseList.length === 0) {
                chartSection.style.display = 'none';
                return;
            }
            chartSection.style.display = 'block';

            const groupedData = {};
            expenseList.forEach(item => {
                groupedData[item.note] = (groupedData[item.note] || 0) + item.amount;
            });

            const sortedItems = Object.keys(groupedData).map(key => ({
                note: key,
                amount: groupedData[key]
            })).sort((a, b) => b.amount - a.amount);

            let finalLabels = [];
            let finalData = [];

            if (sortedItems.length > 4) {
                for (let i = 0; i < 4; i++) {
                    finalLabels.push(sortedItems[i].note);
                    finalData.push(sortedItems[i].amount);
                }
                let otherSum = 0;
                for (let i = 4; i < sortedItems.length; i++) {
                    otherSum += sortedItems[i].amount;
                }
                finalLabels.push('อื่นๆ 🧸');
                finalData.push(otherSum);
            } else {
                sortedItems.forEach(item => {
                    finalLabels.push(item.note);
                    finalData.push(item.amount);
                });
            }

            const ctx = document.getElementById('expenseChart').getContext('2d');
            
            if (expenseChart) {
                expenseChart.data.labels = finalLabels;
                expenseChart.data.datasets[0].data = finalData;
                expenseChart.update();
            } else {
                expenseChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: finalLabels,
                        datasets: [{
                            data: finalData,
                            backgroundColor: ['#ffb4a2', '#ffcdb2', '#b5e48c', '#e2cfea', '#f7d1cd', '#a8b2ff'],
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: {
                            padding: 0
                        },
                        plugins: {
                            legend: {
                                position: 'bottom',
                                align: 'center', /* บังคับให้ป้ายชื่อข้อมูลอยู่ตรงกลาง */
                                labels: {
                                    font: { family: 'Prompt', size: 12 },
                                    boxWidth: 12,
                                    padding: 15
                                }
                            }
                        }
                    }
                });
            }
        }

        function updateUI() {
            list.innerHTML = '';
            let totalBalance = 0; 
            let currentMonthExpenses = 0; 
            const selectedMonth = monthFilter.value;

            const filteredTransactions = transactions.filter(t => {
                if (selectedMonth === 'all') return true;
                const d = new Date(t.date);
                const itemMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                return itemMonth === selectedMonth;
            });

            const currentExpensesList = filteredTransactions.filter(t => t.type === 'minus');

            if (filteredTransactions.length === 0) {
                list.innerHTML = '<div class="no-data">ไม่มีรายการของเดือนนี้ 🍩</div>';
            }

            filteredTransactions.forEach(t => {
                if (t.type === 'plus') totalBalance += t.amount;
                else {
                    totalBalance -= t.amount;
                    currentMonthExpenses += t.amount;
                }

                const d = new Date(t.date);
                const formattedDate = d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' });

                const li = document.createElement('li');
                li.classList.add('item', t.type);
                li.setAttribute('data-id', t.id); 
                li.innerHTML = `
                    <div class="item-details">
                        <span class="item-note">${t.note}</span>
                        <span class="item-date">${formattedDate}</span>
                    </div>
                    <div class="item-right">
                        <span class="item-amount" style="color: ${t.type === 'plus' ? '#7cb55e' : '#e07a64'};">
                            ${t.type === 'plus' ? '+' : '-'}฿${t.amount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                        </span>
                        <button class="action-btn edit-btn-icon" data-edit-id="${t.id}">✏️</button>
                        <button class="action-btn delete-btn-icon" data-delete-id="${t.id}">🗑️</button>
                    </div>
                `;
                list.appendChild(li);
            });

            const budgetLimit = parseFloat(budgetInput.value) || 0;
            budgetUsedLabel.innerText = `ใช้ไป: ฿${currentMonthExpenses.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            if (budgetLimit > 0) {
                let percent = Math.min((currentMonthExpenses / budgetLimit) * 100, 100);
                budgetPercentLabel.innerText = `${Math.round((currentMonthExpenses / budgetLimit) * 100)}%`;
                budgetProgress.style.width = `${percent}%`;

                if (percent >= 100) {
                    budgetProgress.style.backgroundColor = '#ffb4b4'; 
                } else if (percent >= 80) {
                    budgetProgress.style.backgroundColor = '#ffd166'; 
                } else {
                    budgetProgress.style.backgroundColor = '#b5e48c'; 
                }
            } else {
                budgetPercentLabel.innerText = '0%';
                budgetProgress.style.width = '0%';
                budgetProgress.style.backgroundColor = '#b5e48c';
            }

            if (selectedMonth === 'all') {
                balanceTitle.innerText = "ยอดเงินคงเหลือ (ทั้งหมด)";
            } else {
                const [year, month] = selectedMonth.split('-');
                const monthName = new Date(year, month - 1).toLocaleDateString('th-TH', { month: 'long' });
                balanceTitle.innerText = `ยอดรวมเฉพาะเดือน (${monthName})`;
            }

            balanceDisplay.innerText = `฿${totalBalance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            renderExpenseChart(currentExpensesList);

            document.querySelectorAll('.delete-btn-icon').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-delete-id');
                    deleteTransaction(id);
                });
            });

            document.querySelectorAll('.edit-btn-icon').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-edit-id');
                    startEdit(id);
                });
            });

            updateSuggestions();
        }

        function startEdit(id) {
            const target = transactions.find(t => t.id === id);
            if (!target) return;

            editId = id;
            typeSelect.value = target.type;
            amountInput.value = target.amount;
            noteInput.value = target.note;

            submitBtn.innerText = "อัปเดตข้อมูล 🛠️";
            submitBtn.style.background = "#ffd166";
            cancelBtn.style.display = "block";
            
            amountInput.focus();
        }

        function resetFormState() {
            editId = null;
            form.reset();
            submitBtn.innerText = "บันทึกข้อมูล ✨";
            submitBtn.style.background = "var(--primary)";
            cancelBtn.style.display = "none";
        }

        cancelBtn.addEventListener('click', resetFormState);

        async function deleteTransaction(id) {
            const itemElement = document.querySelector(`[data-id="${id}"]`);
            if (itemElement) {
                itemElement.classList.add('fade-out');
                setTimeout(async () => {
                    try {
                        await deleteDoc(doc(db, "transactions", id));
                        showToast("ลบรายการเรียบร้อยแล้ว", "delete");
                        if (editId === id) resetFormState();
                    } catch (error) {
                        console.error("Error deleting document: ", error);
                    }
                }, 300);
            }
        }

        const q = query(transactionsRef, orderBy("date", "desc"));
        
        onSnapshot(q, (snapshot) => {
            transactions = [];
            snapshot.forEach((doc) => {
                transactions.push({ id: doc.id, ...doc.data() });
            });
            updateMonthFilterOptions();
            updateUI();
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const type = typeSelect.value;
            const amount = parseFloat(amountInput.value);
            const note = noteInput.value.trim();

            try {
                if (editId) {
                    const docRef = doc(db, "transactions", editId);
                    await updateDoc(docRef, {
                        type,
                        amount,
                        note
                    });
                    showToast("อัปเดตรายการเรียบร้อย! 💖", "info");
                    resetFormState();
                } else {
                    await addDoc(transactionsRef, {
                        type,
                        amount,
                        note,
                        date: new Date().toISOString()
                    });

                    const budgetLimit = parseFloat(budgetInput.value) || 0;
                    if (type === 'minus' && budgetLimit > 0) {
                        const currentMonthStr = new Date().toISOString().substring(0, 7); 
                        const thisMonthExpenses = transactions
                            .filter(t => t.type === 'minus' && t.date.startsWith(currentMonthStr))
                            .reduce((sum, t) => sum + t.amount, 0) + amount;

                        if (thisMonthExpenses > budgetLimit) {
                            showToast(`เตือนสติ! เดือนนี้คุณใช้เงินเกินงบไปแล้วนะตัวเธอ 🚨`, "warning");
                        } else {
                            showToast("บันทึกข้อมูลสำเร็จเรียบร้อยแล้ว!", "success");
                        }
                    } else {
                        showToast("บันทึกข้อมูลสำเร็จเรียบร้อยแล้ว!", "success");
                    }
                    
                    form.reset();
                }
            } catch (error) {
                console.error("Error writing document: ", error);
                alert("เกิดข้อผิดพลาดในการติดต่อกับ Firebase!");
            }
        });

        monthFilter.addEventListener('change', updateUI);
    </script>
</body>
</html>
