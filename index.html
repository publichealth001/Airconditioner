<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บุญสมบุญสมแอร์เซอร์วิส | ติดตั้ง ล้าง ซ่อมแอร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .brand-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .product-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="text-slate-800">

    <div id="loader" class="fixed inset-0 bg-white z-[100] flex flex-col justify-center items-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-blue-600 border-opacity-25 mb-4" style="border-right-color: #2563eb;"></div>
        <p class="text-slate-500 font-medium">กำลังเตรียมข้อมูลแอร์...</p>
    </div>

    <header class="bg-blue-700 text-white shadow-lg sticky top-0 z-40">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white p-2 rounded-xl shadow-inner text-2xl">❄️</div>
                <div>
                    <h1 class="text-lg md:text-xl font-bold leading-none">บุญสมบุญสมแอร์เซอร์วิส</h1>
                    <p class="text-[10px] md:text-xs text-blue-100 mt-1 uppercase tracking-wider">Professional Air Service</p>
                </div>
            </div>
            <button id="adminBtn" onclick="toggleAdmin()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl text-xs font-bold border border-white/20 transition-all">
                🔒 แอดมิน
            </button>
        </div>
    </header>

    <nav class="bg-white shadow-sm border-b sticky top-[68px] md:top-[76px] z-30">
        <div class="container mx-auto px-2 py-3">
            <div id="brand-filters" class="flex gap-2 overflow-x-auto hide-scrollbar px-2">
                </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 min-h-screen">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <footer class="bg-slate-900 text-slate-500 py-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-white font-bold mb-2">บุญสมบุญสมแอร์เซอร์วิส</p>
            <p class="text-sm">บริการติดตั้ง ล้าง ซ่อม ย้าย แอร์ทุกยี่ห้อ ในราคามิตรภาพ</p>
        </div>
    </footer>

    <div id="loginModal" class="modal fixed inset-0 bg-slate-900/60 backdrop-blur-sm justify-center items-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
            <h2 class="text-2xl font-bold text-center mb-6">โหมดผู้ดูแลระบบ</h2>
            <input type="password" id="adminPassword" placeholder="ระบุรหัสผ่าน" class="w-full border-2 border-slate-100 p-4 rounded-2xl mb-4 text-center text-xl tracking-widest outline-none focus:border-blue-500">
            <div class="flex gap-3">
                <button onclick="closeModal('loginModal')" class="flex-1 py-3 font-bold text-slate-400">ยกเลิก</button>
                <button onclick="checkPassword()" class="flex-2 bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-blue-100 transition-all active:scale-95">ยืนยัน</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal fixed inset-0 bg-slate-900/60 backdrop-blur-sm justify-center items-center z-50 p-4">
        <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-6 border-b pb-4">✏️ แก้ไขข้อมูลแอร์</h2>
            <input type="hidden" id="editId">
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">ชื่อรุ่น / รหัส</label>
                    <input type="text" id="editModel" class="w-full border-2 border-slate-50 p-3 rounded-xl focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">ราคา (บาท)</label>
                    <input type="text" id="editPrice" class="w-full border-2 border-slate-50 p-3 rounded-xl focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">ลิงก์รูปภาพ (หรือว่างไว้เพื่อใช้รูปเดิม)</label>
                    <input type="text" id="editImg" class="w-full border-2 border-slate-50 p-3 rounded-xl focus:border-blue-500 outline-none text-xs" placeholder="https://...">
                </div>
            </div>
            <button id="saveBtn" onclick="saveEdit()" class="w-full mt-8 bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-green-600 transition-all">💾 บันทึกข้อมูล</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdnDcProI1UFW2a9eGiUJbLYmI7ihM1XQ",
            authDomain: "boonsomair-3f5b0.firebaseapp.com",
            projectId: "boonsomair-3f5b0",
            storageBucket: "boonsomair-3f5b0.firebasestorage.app",
            messagingSenderId: "831800219771",
            appId: "1:831800219771:web:97243e82b452a14e0a2ade"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let products = [];
        let isAdmin = false;
        let currentBrand = "ทั้งหมด";
        const fallbackImg = "https://images.unsplash.com/photo-1620288627223-53302f4e8c74?q=80&w=400";

        // รายชื่อแอร์ 100+ รุ่น
        const initialData = [
            { cat: "มิตซู ธรรมดา", items: [ {m: "MS-GY09VF", p: "16,100"}, {m: "MS-GY12VF", p: "19,000"}, {m: "MS-GY18VF", p: "28,000"} ] },
            { cat: "มิตซู Inverter (ใหม่)", items: [ {m: "MSY-KA09", p: "15,600"}, {m: "MSY-KA13", p: "16,000"}, {m: "MSY-KA15", p: "21,400"}, {m: "MSY-KA18", p: "24,200"}, {m: "MSY-KA24", p: "32,000"} ] },
            { cat: "มิตซู Supper Inverter (ใหม่)", items: [ {m: "MSY-GZ09", p: "21,600"}, {m: "MSY-GZ13", p: "25,150"}, {m: "MSY-GZ18", p: "33,000"} ] },
            { cat: "ไดกิ้น ธรรมดา", items: [ {m: "FTM09", p: "15,100"}, {m: "FTM13", p: "17,600"}, {m: "FTM15", p: "20,800"}, {m: "FTM18", p: "25,000"} ] },
            { cat: "ไดกิ้น Inverter", items: [ {m: "FTKB09ZV", p: "13,900"}, {m: "FTKB12ZV", p: "14,500"}, {m: "FTKB15ZV", p: "18,500"}, {m: "FTKB18ZV", p: "19,700"}, {m: "FTKB24ZV", p: "25,000"} ] },
            { cat: "เซ็นทรัลแอร์ ธรรมดา", items: [ {m: "MFE18", p: "16,800"}, {m: "MFE25", p: "20,600"}, {m: "2JSFE09", p: "11,600"}, {m: "2JSFE13", p: "12,400"}, {m: "2JSFE18", p: "16,200"}, {m: "2JSFE25", p: "20,000"} ] },
            { cat: "เซ็นทรัลแอร์ Inverter", items: [ {m: "IVM09", p: "11,600"}, {m: "IVM13", p: "12,600"}, {m: "IVM18", p: "16,700"}, {m: "IVM25", p: "20,600"}, {m: "IVJS09", p: "11,600"}, {m: "IVJS13", p: "12,200"}, {m: "IVJS18", p: "16,000"}, {m: "IVJS25", p: "19,900"} ] },
            { cat: "แคเรีย ธรรมดา COPPER TECH S (ใหม่2026)", items: [ {m: "NSAA10", p: "12,800"}, {m: "NSAA13", p: "13,100"}, {m: "NSAA18", p: "17,800"}, {m: "NSAA25", p: "23,100"} ] },
            { cat: "แคเรีย ธรรมดา Copper 7", items: [ {m: "TSAA010", p: "13,800"}, {m: "TSAA013", p: "14,300"}, {m: "TSAA018", p: "20,900"}, {m: "TSAA025", p: "26,500"} ] },
            { cat: "แคเรียน อิน Copper 11 (Wi-Fi)", items: [ {m: "42TVEA010", p: "14,000"}, {m: "42TVEA016", p: "19,100"} ] },
            { cat: "แคเรีย อิน Coper SEAL (ใหม่ 2026)", items: [ {m: "42TVDB010", p: "13,150"}, {m: "42TVDB013", p: "13,900"}, {m: "42TVDB018", p: "19,000"}, {m: "42TVDB026", p: "28,600"} ] },
            { cat: "แคเรีย อิน Copper ION Wi-Fi (ใหม่2026)", items: [ {m: "42TVEB10", p: "13,800"}, {m: "42TVEB13", p: "14,600"}, {m: "42TVEB16", p: "18,500"}, {m: "42TVEB18", p: "19,600"}, {m: "42TVEB22", p: "24,500"}, {m: "42TVEB26", p: "29,300"} ] },
            { cat: "ไฮเออร์ ธรรมดา", items: [ {m: "CQRC10", p: "12,100"}, {m: "CQRC13", p: "12,400"}, {m: "CQRC18", p: "17,200"}, {m: "CQRC24", p: "21,100"} ] },
            { cat: "ไฮเออร์ Inverter", items: [ {m: "VQAC09", p: "12,400"}, {m: "VQAC12", p: "12,900"}, {m: "VQAC15", p: "16,100"}, {m: "VQAC18", p: "17,200"}, {m: "VQAC24", p: "21,300"} ] },
            { cat: "Mitsubishi Heavy ธรรมดา", items: [ {m: "CYV10", p: "15,400"}, {m: "CYV13", p: "17,150"}, {m: "CYV18", p: "24,300"}, {m: "CXV24", p: "31,300"} ] },
            { cat: "อิมิเน้น ธรรมดา", items: [ {m: "AFG09F", p: "12,600"}, {m: "AFH12F", p: "13,400"}, {m: "AFH18F", p: "17,800"}, {m: "AFH24F", p: "22,000"} ] },
            { cat: "อิมิเน้น Inverter", items: [ {m: "AVH09", p: "13,000"}, {m: "AVH12", p: "13,500"}, {m: "AVH18", p: "18,000"}, {m: "AVH24", p: "21,900"} ] },
            { cat: "SINCLAIR Inverter", items: [ {m: "SIHC-09", p: "11,100"}, {m: "SIHC-12", p: "11,600"}, {m: "SIHC-18", p: "14,900"}, {m: "SIHC-24", p: "18,400"} ] },
            { cat: "TCL Inverter WiFi", items: [ {m: "T-PROWD10", p: "12,100"}, {m: "T-PROWD13", p: "12,700"}, {m: "T-PROWD19", p: "16,800"}, {m: "T-PROWD25", p: "19,900"} ] },
            { cat: "เอลจี Inverter", items: [ {m: "IBY11", p: "12,700"}, {m: "IBY13", p: "12,900"}, {m: "IKR18", p: "17,400"} ] },
            { cat: "ไมเดีย Inverter", items: [ {m: "MSCE10", p: "10,700"}, {m: "MSCE13", p: "11,400"}, {m: "MSNE19", p: "16,500"}, {m: "MSNE25", p: "20,700"} ] },
            { cat: "AUX Inverter", items: [ {m: "ASW-09/DIM-1S", p: "10,700"}, {m: "ASW-13/DIM-1S", p: "11,800"}, {m: "ASW-18/DIM-1S", p: "14,800"}, {m: "ASW-24/DIM-1S", p: "18,900"} ] },
            { cat: "ซัยโจ ธรรมดา", items: [ {m: "SWG12", p: "11,800"}, {m: "SWG18", p: "15,300"}, {m: "SWG25", p: "19,300"} ] },
            { cat: "แคนดี้ Inverter", items: [ {m: "CE-12VPCT", p: "10,900"}, {m: "CE-18VPCT", p: "12,500"}, {m: "CE-24VPCT", p: "14,400"} ] }
        ];

        function extractBrand(category) {
            const cat = category.toLowerCase();
            if (cat.includes('mitsubishi heavy')) return 'Mitsu Heavy';
            if (cat.includes('มิตซู')) return 'Mitsubishi';
            if (cat.includes('ไดกิ้น')) return 'Daikin';
            if (cat.includes('เซ็นทรัล')) return 'Central Air';
            if (cat.includes('แคเรีย')) return 'Carrier';
            if (cat.includes('ไฮเออร์')) return 'Haier';
            if (cat.includes('อิมิเน้น')) return 'Eminent';
            if (cat.includes('ฮิตาชิ')) return 'Hitachi';
            if (cat.includes('sinclair')) return 'Sinclair';
            if (cat.includes('tcl')) return 'TCL';
            if (cat.includes('เอลจี')) return 'LG';
            if (cat.includes('ไมเดีย')) return 'Midea';
            if (cat.includes('aux')) return 'AUX';
            if (cat.includes('ซัยโจ')) return 'Saijo Denki';
            if (cat.includes('แคนดี้')) return 'Candy';
            return 'อื่นๆ';
        }

        async function loadData() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                if (querySnapshot.empty) {
                    for (const category of initialData) {
                        const brandName = extractBrand(category.cat);
                        for (const item of category.items) {
                            await addDoc(collection(db, "products"), {
                                brand: brandName,
                                category: category.cat,
                                model: item.m,
                                price: item.p,
                                img: "" // ใส่ว่างไว้ก่อน
                            });
                        }
                    }
                    return loadData();
                }
                products = [];
                querySnapshot.forEach((doc) => { products.push({ id: doc.id, ...doc.data() }); });
                document.getElementById('loader').classList.add('hidden');
                renderBrands();
                renderProducts();
            } catch (e) { console.error(e); }
        }

        function renderBrands() {
            const container = document.getElementById('brand-filters');
            const brands = ["ทั้งหมด", ...new Set(products.map(p => p.brand))];
            container.innerHTML = brands.map(b => `
                <button onclick="window.setBrand('${b}')" class="brand-btn whitespace-nowrap px-6 py-2 rounded-2xl border-2 font-bold transition-all ${currentBrand === b ? 'active' : 'bg-white border-slate-100 text-slate-500 hover:bg-slate-50'}">${b}</button>
            `).join('');
        }

        window.setBrand = (brand) => { currentBrand = brand; renderBrands(); renderProducts(); };

        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            let filtered = currentBrand === "ทั้งหมด" ? products : products.filter(p => p.brand === currentBrand);
            
            // เรียงลำดับตามหมวดหมู่
            const grouped = filtered.reduce((acc, curr) => {
                if (!acc[curr.category]) acc[curr.category] = [];
                acc[curr.category].push(curr);
                return acc;
            }, {});

            for (const [category, items] of Object.entries(grouped)) {
                container.innerHTML += `<div class="col-span-full mt-6 mb-2 border-l-4 border-blue-600 pl-4"><h2 class="text-xl font-bold text-slate-800">${category}</h2></div>`;
                items.forEach(p => {
                    // --- ระบบ Image Proxy แก้ปัญหารูปโหลดไม่ขึ้น ---
                    let displayImg = p.img || fallbackImg;
                    if (p.img && p.img.startsWith('http') && !p.img.includes('firebasestorage')) {
                        displayImg = `https://wsrv.nl/?url=${encodeURIComponent(p.img)}&w=400&output=webp`;
                    }

                    container.innerHTML += `
                        <div class="product-card bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                            <div class="h-48 bg-slate-50 flex items-center justify-center p-6 relative">
                                <img src="${displayImg}" alt="${p.model}" onerror="this.src='${fallbackImg}'" class="max-h-full max-w-full object-contain">
                                <span class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-lg text-[10px] font-black text-blue-600 border border-blue-50 shadow-sm">${p.brand}</span>
                            </div>
                            <div class="p-5 flex-grow">
                                <h3 class="font-bold text-slate-800 h-12 overflow-hidden text-sm md:text-base mb-2">${p.model}</h3>
                                <p class="text-blue-600 font-black text-2xl">฿${p.price}</p>
                            </div>
                            ${isAdmin ? `
                                <div class="p-4 pt-0">
                                    <button onclick="openEditModal('${p.id}')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-xs">🔧 แก้ไขข้อมูล / ใส่รูป</button>
                                </div>` : ''}
                        </div>`;
                });
            }
        }

        window.toggleAdmin = () => isAdmin ? location.reload() : document.getElementById('loginModal').classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        window.checkPassword = () => {
            if(document.getElementById('adminPassword').value === '4321') {
                isAdmin = true; closeModal('loginModal'); 
                document.getElementById('adminBtn').innerText = "🔓 ออกจากระบบ";
                document.getElementById('adminBtn').classList.add('bg-red-500');
                renderProducts();
            } else { alert('รหัสผ่านไม่ถูกต้อง!'); }
        };

        window.openEditModal = (id) => {
            const p = products.find(prod => prod.id === id);
            if(p) {
                document.getElementById('editId').value = p.id;
                document.getElementById('editModel').value = p.model;
                document.getElementById('editPrice').value = p.price;
                document.getElementById('editImg').value = p.img || '';
                document.getElementById('editModal').classList.add('active');
            }
        };

        window.saveEdit = async () => {
            const id = document.getElementById('editId').value;
            const btn = document.getElementById('saveBtn');
            btn.innerText = "กำลังบันทึก..."; btn.disabled = true;
            try {
                await updateDoc(doc(db, "products", id), {
                    model: document.getElementById('editModel').value,
                    price: document.getElementById('editPrice').value,
                    img: document.getElementById('editImg').value
                });
                await loadData(); closeModal('editModal');
            } catch (e) { alert('บันทึกไม่สำเร็จ'); }
            finally { btn.innerText = "💾 บันทึกข้อมูล"; btn.disabled = false; }
        };

        loadData();
    </script>
</body>
</html>
