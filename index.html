<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บุญสมบุญสมแอร์เซอร์วิส | ติดตั้ง ล้าง ซ่อมแอร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .brand-btn.active { background-color: #1e40af; color: white; border-color: #1e40af; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        #loader { display: flex; }
        #loader.hidden { display: none; }
    </style>
</head>
<body class="text-slate-800">

    <div id="loader" class="fixed inset-0 bg-white z-[100] flex flex-col justify-center items-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-600 mb-4"></div>
        <p class="text-gray-600 font-semibold" id="loader-text">กำลังโหลดข้อมูลแอร์...</p>
    </div>

    <header class="bg-gradient-to-r from-blue-800 via-blue-600 to-blue-500 text-white shadow-xl sticky top-0 z-40">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl filter drop-shadow-md">❄️</span>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-tight">บุญสมบุญสมแอร์เซอร์วิส</h1>
                    <p class="text-xs md:text-sm text-blue-100 opacity-90">ติดตั้ง ล้าง ซ่อม ย้าย แอร์ทุกยี่ห้อ</p>
                </div>
            </div>
            <button id="adminBtn" onclick="toggleAdmin()" class="bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/30 text-white px-4 py-2 rounded-xl text-sm transition-all active:scale-95 shadow-inner">
                🔒 แอดมิน
            </button>
        </div>
    </header>

    <nav class="bg-white shadow-md border-b sticky top-[72px] md:top-[80px] z-30">
        <div class="container mx-auto px-4 py-3">
            <div id="brand-filters" class="flex gap-2 overflow-x-auto hide-scrollbar py-1">
                </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 min-h-screen">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-10 mt-10">
        <div class="container mx-auto px-4 text-center">
            <p class="text-white font-semibold mb-2">บุญสมบุญสมแอร์เซอร์วิส</p>
            <p class="text-sm">บริการด้วยใจ ในราคามิตรภาพ</p>
        </div>
    </footer>

    <div id="loginModal" class="modal fixed inset-0 bg-slate-900/80 backdrop-blur-sm justify-center items-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <div class="bg-blue-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-3xl">🔐</span>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">เข้าสู่ระบบหลังบ้าน</h2>
            <p class="text-slate-500 text-sm mb-6">เฉพาะผู้ดูแลร้านเท่านั้น</p>
            <input type="password" id="adminPassword" placeholder="รหัสผ่าน" class="w-full border-2 border-slate-100 focus:border-blue-500 outline-none p-4 rounded-2xl mb-4 text-center text-xl tracking-[0.5em] transition-all">
            <div class="flex gap-3">
                <button onclick="closeModal('loginModal')" class="flex-1 py-3 text-slate-600 font-semibold">ปิด</button>
                <button onclick="checkPassword()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-2xl font-bold shadow-lg shadow-blue-200 transition-all active:scale-95">ตกลง</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal fixed inset-0 bg-slate-900/80 backdrop-blur-sm justify-center items-center z-50 p-4">
        <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-xl font-bold text-slate-800">✏️ แก้ไขข้อมูลจริงบนเว็บ</h2>
                <button onclick="closeModal('editModal')" class="text-slate-400 hover:text-slate-600">✕</button>
            </div>
            <input type="hidden" id="editId">
            <div class="space-y-5">
                <div>
                    <label class="block mb-1.5 text-sm font-semibold text-slate-700">ชื่อรุ่น / รหัสสินค้า</label>
                    <input type="text" id="editModel" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1.5 text-sm font-semibold text-slate-700">ราคา (บาท)</label>
                        <input type="text" id="editPrice" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block mb-1.5 text-sm font-semibold text-slate-700">BTU</label>
                        <input type="text" id="editBtu" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none" placeholder="เช่น 9,000">
                    </div>
                </div>
                <div>
                    <label class="block mb-1.5 text-sm font-semibold text-slate-700">เหมาะกับขนาดห้อง (ตร.ม.)</label>
                    <input type="text" id="editRoom" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none" placeholder="เช่น 9-12">
                </div>
                <div>
                    <label class="block mb-1.5 text-sm font-semibold text-slate-700">ลิงก์รูปภาพ (URL)</label>
                    <input type="text" id="editImg" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-blue-500 outline-none text-sm" placeholder="https://...">
                </div>
            </div>
            <button id="saveBtn" onclick="saveEdit()" class="w-full mt-8 bg-green-500 hover:bg-green-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-green-100 transition-all active:scale-95">💾 บันทึกข้อมูลทันที</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdnDcProI1UFW2a9eGiUJbLYmI7ihM1XQ",
            authDomain: "boonsomair-3f5b0.firebaseapp.com",
            projectId: "boonsomair-3f5b0",
            storageBucket: "boonsomair-3f5b0.firebasestorage.app",
            messagingSenderId: "831800219771",
            appId: "1:831800219771:web:97243e82b452a14e0a2ade"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let products = [];
        let isAdmin = false;
        let currentBrand = "ทั้งหมด";
        const fallbackImg = "https://images.unsplash.com/photo-1620288627223-53302f4e8c74?q=80&w=600&auto=format&fit=crop";

        const initialData = [
            { cat: "มิตซู ธรรมดา", items: [ {m: "MS-GY09VF", p: "16,100"}, {m: "MS-GY12VF", p: "19,000"}, {m: "MS-GY18VF", p: "28,000"} ] },
            { cat: "มิตซู Inverter (ใหม่)", items: [ {m: "MSY-KA09", p: "15,600"}, {m: "MSY-KA13", p: "16,000"}, {m: "MSY-KA15", p: "21,400"}, {m: "MSY-KA18", p: "24,200"}, {m: "MSY-KA24", p: "32,000"} ] },
            { cat: "มิตซู Supper Inverter (ใหม่)", items: [ {m: "MSY-GZ09", p: "21,600"}, {m: "MSY-GZ13", p: "25,150"}, {m: "MSY-GZ18", p: "33,000"} ] },
            { cat: "ไดกิ้น ธรรมดา", items: [ {m: "FTM09", p: "15,100"}, {m: "FTM13", p: "17,600"}, {m: "FTM15", p: "20,800"}, {m: "FTM18", p: "25,000"} ] },
            { cat: "ไดกิ้น Inverter", items: [ {m: "FTKB09ZV", p: "13,900"}, {m: "FTKB12ZV", p: "14,500"}, {m: "FTKB15ZV", p: "18,500"}, {m: "FTKB18ZV", p: "19,700"}, {m: "FTKB24ZV", p: "25,000"} ] },
            { cat: "เซ็นทรัลแอร์ ธรรมดา", items: [ {m: "MFE09", p: "สอบถามราคา"}, {m: "MFE13", p: "สอบถามราคา"}, {m: "MFE18", p: "16,800"}, {m: "MFE25", p: "20,600"}, {m: "2JSFE09", p: "11,600"}, {m: "2JSFE13", p: "12,400"}, {m: "2JSFE18", p: "16,200"}, {m: "2JSFE25", p: "20,000"} ] },
            { cat: "เซ็นทรัลแอร์ Inverter", items: [ {m: "IVM09", p: "11,600"}, {m: "IVM13", p: "12,600"}, {m: "IVM18", p: "16,700"}, {m: "IVM25", p: "20,600"}, {m: "IVJS09", p: "11,600"}, {m: "IVJS13", p: "12,200"}, {m: "IVJS18", p: "16,000"}, {m: "IVJS25", p: "19,900"} ] },
            { cat: "แคเรีย ธรรมดา COPPER TECH S (ใหม่2026)", items: [ {m: "NSAA10", p: "12,800"}, {m: "NSAA13", p: "13,100"}, {m: "NSAA18", p: "17,800"}, {m: "NSAA25", p: "23,100"} ] },
            { cat: "แคเรีย ธรรมดา Copper 7", items: [ {m: "TSAA010", p: "13,800"}, {m: "TSAA013", p: "14,300"}, {m: "TSAA018", p: "20,900"}, {m: "TSAA025", p: "26,500"} ] },
            { cat: "แคเรีย อิน Copper 11 (Wi-Fi)", items: [ {m: "42TVEA010", p: "14,000"}, {m: "42TVEA016", p: "19,100"} ] },
            { cat: "แคเรีย อิน Coper SEAL (ใหม่ 2026)", items: [ {m: "42TVDB010", p: "13,150 (รอของเข้า)"}, {m: "42TVDB013", p: "13,900 (รอของเข้า)"}, {m: "42TVDB016", p: "17,800 (รอของเข้า)"}, {m: "42TVDB018", p: "19,000"}, {m: "42TVDB022", p: "23,800 (รอของเข้า)"}, {m: "42TVDB026", p: "28,600 (รอของเข้า)"} ] },
            { cat: "แคเรีย อิน Copper ION Wi-Fi (ใหม่2026)", items: [ {m: "42TVEB10", p: "13,800"}, {m: "42TVEB13", p: "14,600"}, {m: "42TVEB16", p: "18,500"}, {m: "42TVEB18", p: "19,600"}, {m: "42TVEB22", p: "24,500"}, {m: "42TVEB26", p: "29,300"} ] },
            { cat: "ไฮเออร์ ธรรมดา", items: [ {m: "CQRC10", p: "12,100"}, {m: "CQRC13", p: "12,400"}, {m: "CQRC18", p: "17,200"}, {m: "CQRC24", p: "21,100"} ] },
            { cat: "ไฮเออร์ Inverter", items: [ {m: "VQAC09", p: "12,400"}, {m: "VQAC12", p: "12,900"}, {m: "VQAC15", p: "16,100"}, {m: "VQAC18", p: "17,200"}, {m: "VQAC24", p: "21,300"} ] },
            { cat: "Mitsubishi Heavy ธรรมดา", items: [ {m: "CYV10", p: "15,400 (รหัสใหม่)"}, {m: "CYV13", p: "17,150 (รหัสใหม่)"}, {m: "CYV15", p: "19,600 (รหัสใหม่)"}, {m: "CYV18", p: "24,300 (รหัสใหม่)"}, {m: "CXV24", p: "31,300"} ] },
            { cat: "อิมิเน้น ธรรมดา", items: [ {m: "AFG09F", p: "12,600"}, {m: "AFH12F", p: "13,400"}, {m: "AFH18F", p: "17,800"}, {m: "AFH24F", p: "22,000"} ] },
            { cat: "อิมิเน้น Inverter", items: [ {m: "AVH09", p: "13,000"}, {m: "AVH12", p: "13,500"}, {m: "AVH18", p: "18,000"}, {m: "AVH24", p: "21,900"} ] },
            { cat: "ฮิตาชิ ธรรมดา", items: [ {m: "BJ13", p: "13,300"}, {m: "BJ18", p: "18,500"}, {m: "BJ24", p: "22,800"} ] },
            { cat: "SINCLAIR Inverter", items: [ {m: "SIHC-09", p: "11,100"}, {m: "SIHC-12", p: "11,600"}, {m: "SIHC-18", p: "14,900"}, {m: "SIHC-24", p: "18,400"} ] },
            { cat: "TCL ธรรมดา", items: [ {m: "MFS10", p: "11,700"}, {m: "MFS13", p: "12,600"}, {m: "MFS19", p: "17,400"}, {m: "MFS26", p: "20,800"} ] },
            { cat: "TCL Inverter WiFi", items: [ {m: "T-PROWD10", p: "12,100"}, {m: "T-PROWD13", p: "12,700"}, {m: "T-PROWD19", p: "16,800"}, {m: "T-PROWD25", p: "19,900"} ] },
            { cat: "เอลจี Inverter", items: [ {m: "IBY11", p: "12,700 (รหัสใหม่)"}, {m: "IBY13", p: "12,900 (รหัสใหม่)"}, {m: "IKR18", p: "17,400"} ] },
            { cat: "ไมเดีย Inverter", items: [ {m: "MSCE10", p: "10,700"}, {m: "MSCE13", p: "11,400"}, {m: "MSNE19", p: "16,500"}, {m: "MSNE25", p: "20,700"} ] },
            { cat: "AUX Inverter", items: [ {m: "ASW-09/DIM-1S", p: "10,700"}, {m: "ASW-13/DIM-1S", p: "11,800"}, {m: "ASW-18/DIM-1S", p: "14,800"}, {m: "ASW-24/DIM-1S", p: "18,900"} ] },
            { cat: "ซัยโจ ธรรมดา", items: [ {m: "SWG12", p: "11,800 (ตัวฟอก)"}, {m: "SWG18", p: "15,300"}, {m: "SWG25", p: "19,300"} ] },
            { cat: "แคนดี้ ธรรมดา", items: [ {m: "CE-09PCTF", p: "9,800"}, {m: "CE-12PCTF", p: "10,900"}, {m: "CE-18PCTF", p: "12,500"} ] },
            { cat: "แคนดี้ Inverter", items: [ {m: "CE-09VPCT", p: "รอของเข้า"}, {m: "CE-12VPCT", p: "10,900"}, {m: "CE-18VPCT", p: "12,500"}, {m: "CE-24VPCT", p: "14,400"} ] }
        ];

        function extractBrand(category) {
            const cat = category.toLowerCase();
            if (cat.includes('mitsubishi heavy')) return 'Mitsu Heavy';
            if (cat.includes('มิตซู')) return 'Mitsubishi';
            if (cat.includes('ไดกิ้น')) return 'Daikin';
            if (cat.includes('เซ็นทรัล')) return 'Central Air';
            if (cat.includes('แคเรีย')) return 'Carrier';
            if (cat.includes('ไฮเออร์')) return 'Haier';
            if (cat.includes('อิมิเน้น')) return 'Eminent';
            if (cat.includes('ฮิตาชิ')) return 'Hitachi';
            if (cat.includes('sinclair')) return 'Sinclair';
            if (cat.includes('tcl')) return 'TCL';
            if (cat.includes('เอลจี')) return 'LG';
            if (cat.includes('ไมเดีย')) return 'Midea';
            if (cat.includes('aux')) return 'AUX';
            if (cat.includes('ซัยโจ')) return 'Saijo Denki';
            if (cat.includes('แคนดี้')) return 'Candy';
            return 'อื่นๆ';
        }

        async function loadData() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                if (querySnapshot.empty) {
                    document.getElementById('loader-text').innerText = "กำลังสร้างฐานข้อมูลครั้งแรก (รอสักครู่)...";
                    for (const category of initialData) {
                        const brandName = extractBrand(category.cat);
                        for (const item of category.items) {
                            await addDoc(collection(db, "products"), {
                                brand: brandName,
                                category: category.cat,
                                model: item.m,
                                price: item.p,
                                btu: "",
                                room: "",
                                img: fallbackImg
                            });
                        }
                    }
                    return loadData(); 
                }
                products = [];
                querySnapshot.forEach((doc) => { products.push({ id: doc.id, ...doc.data() }); });
                document.getElementById('loader').classList.add('hidden');
                renderBrands();
                renderProducts();
            } catch (error) {
                document.getElementById('loader-text').innerText = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
            }
        }

        window.toggleAdmin = function() {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('adminBtn').innerHTML = "🔒 แอดมิน";
                document.getElementById('adminBtn').className = "bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/30 text-white px-4 py-2 rounded-xl text-sm transition-all shadow-inner";
                renderProducts();
            } else {
                document.getElementById('loginModal').classList.add('active');
            }
        };

        window.checkPassword = function() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === '4321') {
                isAdmin = true;
                document.getElementById('adminBtn').innerHTML = "🔓 ออกจากระบบ";
                document.getElementById('adminBtn').className = "bg-red-500 text-white px-4 py-2 rounded-xl text-sm transition-all shadow-lg active:scale-95";
                closeModal('loginModal');
                document.getElementById('adminPassword').value = '';
                renderProducts();
            } else {
                alert('รหัสผ่านไม่ถูกต้อง');
            }
        };

        window.closeModal = function(id) { document.getElementById(id).classList.remove('active'); };

        window.openEditModal = function(id) {
            const p = products.find(prod => prod.id === id);
            if(p) {
                document.getElementById('editId').value = p.id;
                document.getElementById('editModel').value = p.model;
                document.getElementById('editPrice').value = p.price;
                document.getElementById('editBtu').value = p.btu || '';
                document.getElementById('editRoom').value = p.room || '';
                document.getElementById('editImg').value = p.img !== fallbackImg ? p.img : '';
                document.getElementById('editModal').classList.add('active');
            }
        };

        window.saveEdit = async function() {
            const id = document.getElementById('editId').value;
            const btn = document.getElementById('saveBtn');
            btn.innerText = "⏳ กำลังบันทึก...";
            btn.disabled = true;
            try {
                await updateDoc(doc(db, "products", id), {
                    model: document.getElementById('editModel').value,
                    price: document.getElementById('editPrice').value,
                    btu: document.getElementById('editBtu').value,
                    room: document.getElementById('editRoom').value,
                    img: document.getElementById('editImg').value || fallbackImg
                });
                await loadData();
                closeModal('editModal');
            } catch (error) {
                alert("เกิดข้อผิดพลาด");
            } finally {
                btn.innerText = "💾 บันทึกข้อมูลทันที";
                btn.disabled = false;
            }
        };

        function renderBrands() {
            const container = document.getElementById('brand-filters');
            const brands = ["ทั้งหมด", ...new Set(products.map(p => p.brand))];
            container.innerHTML = '';
            brands.forEach(brand => {
                const btn = document.createElement('button');
                const isActive = brand === currentBrand ? 'active' : 'text-slate-600 border-slate-200 hover:bg-slate-50';
                btn.className = `brand-btn whitespace-nowrap px-5 py-2 rounded-xl border-2 text-sm font-bold transition-all ${isActive}`;
                btn.innerText = brand;
                btn.onclick = () => { currentBrand = brand; renderBrands(); renderProducts(); };
                container.appendChild(btn);
            });
        }

        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            let filtered = currentBrand !== "ทั้งหมด" ? products.filter(p => p.brand === currentBrand) : products;
            
            const grouped = filtered.reduce((acc, curr) => {
                if (!acc[curr.category]) acc[curr.category] = [];
                acc[curr.category].push(curr);
                return acc;
            }, {});

            for (const [category, items] of Object.entries(grouped)) {
                container.innerHTML += `<div class="col-span-full mt-8 mb-2 flex items-center gap-4">
                    <h2 class="text-xl font-extrabold text-blue-900">${category}</h2>
                    <div class="h-[2px] bg-blue-100 flex-grow rounded-full"></div>
                </div>`;
                items.forEach(p => {
                    const priceText = p.price.includes('รอ') || p.price.includes('สอบถาม') ? p.price : `฿${p.price}`;
                    const priceColor = p.price.includes('รอ') ? 'text-amber-500' : 'text-blue-700';
                    container.innerHTML += `
                        <div class="bg-white rounded-3xl shadow-sm hover:shadow-xl border border-slate-100 transition-all duration-300 group overflow-hidden">
                            <div class="h-44 bg-slate-50 flex items-center justify-center p-6 relative">
                                <img src="${p.img}" alt="${p.model}" class="max-h-full max-w-full object-contain group-hover:scale-105 transition-transform duration-500">
                                <div class="absolute top-3 left-3 bg-white/80 backdrop-blur-md px-3 py-1 rounded-lg text-[10px] font-bold text-slate-500 border border-slate-100 uppercase tracking-widest">${p.brand}</div>
                            </div>
                            <div class="p-6">
                                <h3 class="text-lg font-bold text-slate-800 leading-tight mb-1 min-h-[3.5rem]">${p.model}</h3>
                                <p class="${priceColor} font-black text-2xl tracking-tighter mb-4">${priceText}</p>
                                <div class="space-y-1.5 border-t pt-4">
                                    <div class="flex justify-between text-sm">
                                        <span class="text-slate-400">ขนาดความเย็น:</span>
                                        <span class="text-slate-700 font-bold">${p.btu || 'สอบถาม'} BTU</span>
                                    </div>
                                    <div class="flex justify-between text-sm">
                                        <span class="text-slate-400">ห้องขนาด:</span>
                                        <span class="text-slate-700 font-bold">${p.room || 'สอบถาม'} ตร.ม.</span>
                                    </div>
                                </div>
                                ${isAdmin ? `<button onclick="openEditModal('${p.id}')" class="mt-5 w-full bg-slate-100 hover:bg-amber-100 text-slate-600 hover:text-amber-800 py-3 rounded-xl font-bold text-sm transition-all border-2 border-transparent hover:border-amber-200">✏️ แก้ไขข้อมูล</button>` : ''}
                            </div>
                        </div>`;
                });
            }
        }
        loadData();
    </script>
</body>
</html>
