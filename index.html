<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บุญสมบุญสมแอร์เซอร์วิส | ติดตั้ง ล้าง ซ่อมแอร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0fdfa; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .brand-btn.active { background-color: #1e3a8a; color: white; border-color: #1e3a8a; }
        
        /* Loading Overlay */
        #loader { display: flex; }
        #loader.hidden { display: none; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-white z-[100] flex-col justify-center items-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-600 mb-4"></div>
        <p class="text-gray-600 font-semibold" id="loader-text">กำลังโหลดข้อมูลจากฐานข้อมูล...</p>
    </div>

    <header class="bg-gradient-to-r from-blue-700 via-blue-500 to-cyan-500 text-white shadow-lg sticky top-0 z-10">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-3xl">❄️</span>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold leading-tight">บุญสมบุญสมแอร์เซอร์วิส</h1>
                    <p class="text-xs md:text-sm text-cyan-100">จำหน่าย ติดตั้ง ล้าง ซ่อม ย้าย แอร์ทุกยี่ห้อ</p>
                </div>
            </div>
            <button id="adminBtn" onclick="toggleAdmin()" class="bg-white/20 hover:bg-white/30 backdrop-blur-sm border border-white/50 text-white px-3 py-1.5 md:px-4 md:py-2 rounded-full text-xs md:text-sm transition duration-300 shadow-sm">
                🔒 เข้าสู่ระบบ
            </button>
        </div>
    </header>

    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="container mx-auto px-4 py-3">
            <h2 class="text-sm font-semibold text-gray-500 mb-2 uppercase tracking-wider">เลือกยี่ห้อแอร์</h2>
            <div id="brand-filters" class="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
                </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 min-h-screen">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="loginModal" class="modal fixed inset-0 bg-black/60 backdrop-blur-sm justify-center items-center z-50">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-96 transform transition-all">
            <div class="text-center mb-6">
                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                    <span class="text-2xl">🔒</span>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">โหมดผู้ดูแลระบบ</h2>
            </div>
            <input type="password" id="adminPassword" placeholder="รหัสผ่าน (4321)" class="w-full border-2 border-gray-200 focus:border-blue-500 outline-none p-3 rounded-xl mb-6 text-center text-lg tracking-widest">
            <div class="flex justify-end gap-3">
                <button onclick="closeModal('loginModal')" class="flex-1 bg-gray-100 px-4 py-3 rounded-xl font-semibold">ยกเลิก</button>
                <button onclick="checkPassword()" class="flex-1 bg-blue-600 text-white px-4 py-3 rounded-xl font-semibold">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal fixed inset-0 bg-black/60 backdrop-blur-sm justify-center items-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2">✏️ แก้ไขข้อมูลแอร์ (อัพเดทขึ้นเว็บจริง)</h2>
            <input type="hidden" id="editId">
            
            <div class="space-y-4">
                <div>
                    <label class="block mb-1 text-sm font-semibold">ชื่อรุ่น</label>
                    <input type="text" id="editModel" class="w-full border p-2 rounded-lg bg-gray-50">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 text-sm font-semibold">ราคา (บาท)</label>
                        <input type="text" id="editPrice" class="w-full border p-2 rounded-lg">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-semibold">BTU</label>
                        <input type="text" id="editBtu" class="w-full border p-2 rounded-lg">
                    </div>
                </div>
                <div>
                    <label class="block mb-1 text-sm font-semibold">ขนาดห้อง (ตร.ม.)</label>
                    <input type="text" id="editRoom" class="w-full border p-2 rounded-lg">
                </div>
                <div>
                    <label class="block mb-1 text-sm font-semibold">ลิงก์รูปภาพ (.jpg, .png)</label>
                    <input type="text" id="editImg" class="w-full border p-2 rounded-lg">
                </div>
            </div>
            
            <div class="flex justify-end gap-3 mt-6 pt-4 border-t">
                <button onclick="closeModal('editModal')" class="px-4 py-2 bg-gray-100 rounded-lg">ยกเลิก</button>
                <button id="saveBtn" onclick="saveEdit()" class="px-4 py-2 bg-green-500 text-white rounded-lg font-semibold">💾 บันทึกขึ้นระบบ</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // รหัส Firebase ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyAdnDcProI1UFW2a9eGiUJbLYmI7ihM1XQ",
            authDomain: "boonsomair-3f5b0.firebaseapp.com",
            projectId: "boonsomair-3f5b0",
            storageBucket: "boonsomair-3f5b0.firebasestorage.app",
            messagingSenderId: "831800219771",
            appId: "1:831800219771:web:97243e82b452a14e0a2ade"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let products = [];
        let isAdmin = false;
        let currentBrand = "ทั้งหมด";
        const fallbackImg = "https://images.unsplash.com/photo-1620288627223-53302f4e8c74?q=80&w=600&auto=format&fit=crop";

        // ข้อมูลตั้งต้น (เอาไว้อัพโหลดขึ้น Firebase ครั้งแรก)
        const initialData = [
            { cat: "มิตซู ธรรมดา", items: [ {m: "MS-GY09VF", p: "16,100"}, {m: "MS-GY12VF", p: "19,000"} ] },
            { cat: "มิตซู Inverter (ใหม่)", items: [ {m: "MSY-KA09", p: "15,600"}, {m: "MSY-KA13", p: "16,000"} ] },
            { cat: "ไดกิ้น Inverter", items: [ {m: "FTKB09ZV", p: "13,900"}, {m: "FTKB12ZV", p: "14,500"} ] },
            { cat: "แคเรีย ธรรมดา Copper 7", items: [ {m: "TSAA010", p: "13,800"}, {m: "TSAA013", p: "14,300"} ] }
            // (ใส่ข้อมูลให้สั้นลงเพื่อความรวดเร็วในการโหลด คุณสามารถแก้ไขเพิ่มเติมผ่านหน้าเว็บได้เลยหลังจากนี้)
        ];

        function extractBrand(category) {
            if (category.includes('มิตซู')) return 'Mitsubishi';
            if (category.includes('ไดกิ้น')) return 'Daikin';
            if (category.includes('แคเรีย')) return 'Carrier';
            return 'อื่นๆ';
        }

        // ดึงข้อมูลจาก Firebase
        async function loadData() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                
                // ถ้าฐานข้อมูลว่างเปล่า (เข้าเว็บครั้งแรก) ให้อัพโหลด initialData ขึ้นไป
                if (querySnapshot.empty) {
                    document.getElementById('loader-text').innerText = "กำลังตั้งค่าฐานข้อมูลครั้งแรก (รอสักครู่)...";
                    for (const category of initialData) {
                        const brandName = extractBrand(category.cat);
                        for (const item of category.items) {
                            await addDoc(collection(db, "products"), {
                                brand: brandName,
                                category: category.cat,
                                model: item.m,
                                price: item.p,
                                btu: "",
                                room: "",
                                img: fallbackImg
                            });
                        }
                    }
                    // อัพโหลดเสร็จแล้ว เรียกโหลดใหม่อีกรอบ
                    return loadData(); 
                }

                // ถ้ามีข้อมูลแล้ว ให้เอามาเก็บในตัวแปร products
                products = [];
                querySnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });

                // ซ่อนหน้าโหลด และแสดงผล
                document.getElementById('loader').classList.add('hidden');
                renderBrands();
                renderProducts();

            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('loader-text').innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล";
                document.getElementById('loader-text').classList.add("text-red-500");
            }
        }

        // ทำให้ฟังก์ชันเหล่านี้ถูกเรียกใช้ผ่าน HTML ได้ (เพราะ type="module" จะจำกัดขอบเขต)
        window.toggleAdmin = function() {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('adminBtn').innerHTML = "🔒 เข้าสู่ระบบ";
                document.getElementById('adminBtn').classList.replace('bg-red-500', 'bg-white/20');
                renderProducts();
            } else {
                document.getElementById('loginModal').classList.add('active');
            }
        };

        window.checkPassword = function() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === '4321') {
                isAdmin = true;
                document.getElementById('adminBtn').innerHTML = "🔓 ออกจากระบบ";
                document.getElementById('adminBtn').classList.replace('bg-white/20', 'bg-red-500');
                closeModal('loginModal');
                document.getElementById('adminPassword').value = '';
                renderProducts();
            } else {
                alert('รหัสผ่านไม่ถูกต้อง');
            }
        };

        window.closeModal = function(id) {
            document.getElementById(id).classList.remove('active');
        };

        window.openEditModal = function(id) {
            const product = products.find(p => p.id === id);
            if(product) {
                document.getElementById('editId').value = product.id;
                document.getElementById('editModel').value = product.model;
                document.getElementById('editPrice').value = product.price;
                document.getElementById('editBtu').value = product.btu || '';
                document.getElementById('editRoom').value = product.room || '';
                document.getElementById('editImg').value = product.img !== fallbackImg ? product.img : '';
                document.getElementById('editModal').classList.add('active');
            }
        };

        // เซฟข้อมูลทับลง Firebase ของจริง!
        window.saveEdit = async function() {
            const id = document.getElementById('editId').value;
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = "⏳ กำลังบันทึก...";
            btn.disabled = true;

            try {
                const docRef = doc(db, "products", id);
                await updateDoc(docRef, {
                    model: document.getElementById('editModel').value,
                    price: document.getElementById('editPrice').value,
                    btu: document.getElementById('editBtu').value,
                    room: document.getElementById('editRoom').value,
                    img: document.getElementById('editImg').value || fallbackImg
                });
                
                // โหลดข้อมูลใหม่หลังจากบันทึกเสร็จ
                await loadData();
                closeModal('editModal');
                alert("อัพเดทข้อมูลขึ้นเว็บไซต์เรียบร้อยแล้ว!");
            } catch (error) {
                console.error("Error updating:", error);
                alert("เกิดข้อผิดพลาดในการบันทึก");
            } finally {
                btn.innerHTML = "💾 บันทึกขึ้นระบบ";
                btn.disabled = false;
            }
        };

        // ส่วนของการวาดหน้าจอ
        function renderBrands() {
            const brandContainer = document.getElementById('brand-filters');
            const brands = ["ทั้งหมด", ...new Set(products.map(p => p.brand))];
            brandContainer.innerHTML = '';
            brands.forEach(brand => {
                const isActive = brand === currentBrand ? 'active' : 'text-gray-600 border-gray-300 hover:bg-gray-100';
                const btn = document.createElement('button');
                btn.className = `brand-btn whitespace-nowrap px-4 py-1.5 rounded-full border text-sm font-medium transition ${isActive}`;
                btn.innerText = brand;
                btn.onclick = () => { currentBrand = brand; renderBrands(); renderProducts(); };
                brandContainer.appendChild(btn);
            });
        }

        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            let filteredProducts = currentBrand !== "ทั้งหมด" ? products.filter(p => p.brand === currentBrand) : products;

            const grouped = filteredProducts.reduce((acc, curr) => {
                if (!acc[curr.category]) acc[curr.category] = [];
                acc[curr.category].push(curr);
                return acc;
            }, {});

            for (const [category, items] of Object.entries(grouped)) {
                container.innerHTML += `<div class="col-span-full mt-6 mb-2"><h2 class="text-xl font-bold bg-white px-4 py-1 border rounded-full inline-block shadow-sm">${category}</h2></div>`;
                items.forEach(p => {
                    let priceClass = p.price.includes('รอ') ? 'text-orange-500' : 'text-blue-600';
                    let priceDisplay = p.price.includes('รอ') ? p.price : `฿${p.price}`;
                    
                    container.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-lg border overflow-hidden">
                            <div class="h-48 flex items-center justify-center p-4 bg-gray-50 relative">
                                <img src="${p.img}" alt="${p.model}" class="max-h-full max-w-full object-contain">
                            </div>
                            <div class="p-5">
                                <h3 class="text-lg font-bold">${p.model}</h3>
                                <p class="${priceClass} font-bold text-2xl mt-1">${priceDisplay}</p>
                                <div class="mt-3 text-sm text-gray-600">
                                    <p>⚡ BTU: ${p.btu || '-'}</p>
                                    <p>🏠 ขนาดห้อง: ${p.room || '-'}</p>
                                </div>
                                ${isAdmin ? `<button onclick="openEditModal('${p.id}')" class="mt-4 w-full bg-amber-100 text-amber-800 py-2 rounded-lg font-bold">✏️ แก้ไขข้อมูล</button>` : ''}
                            </div>
                        </div>`;
                });
            }
        }

        // เริ่มโหลดข้อมูลทันทีที่เปิดเว็บ
        loadData();
    </script>
</body>
</html>
