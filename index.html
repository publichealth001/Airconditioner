<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บุญสมแอร์เซอร์วิส</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a1628;
            --bg-secondary: #0f2847;
            --fg: #f0f6fc;
            --muted: #7a8ba3;
            --accent: #00d4ff;
            --accent-secondary: #00ff94;
            --card: rgba(15, 40, 71, 0.7);
            --border: rgba(0, 212, 255, 0.2);
            --highlight: #ffd700;
            --danger: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--fg); overflow-x: hidden; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Prompt', sans-serif; }
        
        /* พื้นหลัง */
        .hero-bg { position: absolute; inset: 0; overflow: hidden; z-index: 0; }
        .gradient-orb { position: absolute; border-radius: 50%; filter: blur(80px); animation: float 20s ease-in-out infinite; }
        .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 212, 255, 0.3) 0%, transparent 70%); top: -200px; right: -100px; }
        .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(0, 255, 148, 0.2) 0%, transparent 70%); bottom: -150px; left: -100px; animation-delay: -7s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 25% { transform: translate(30px, -30px) scale(1.05); } 50% { transform: translate(-20px, 20px) scale(0.95); } 75% { transform: translate(20px, 30px) scale(1.02); } }
        .grid-pattern { position: absolute; inset: 0; background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px); background-size: 50px 50px; z-index: 1; }
        
        /* การ์ดสินค้า */
        .product-card { background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; display: flex; flex-direction: column; }
        .product-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, transparent 50%); opacity: 0; transition: opacity 0.4s ease; }
        .product-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 212, 255, 0.2); }
        .admin-mode .product-card { cursor: pointer; }
        .admin-mode .product-card:hover { border-color: var(--highlight); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.2); }
        .product-image { position: relative; height: 200px; overflow: hidden; background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg) 100%); display: flex; align-items: center; justify-content: center; }
        
        /* ป้ายต่างๆ */
        .type-badge { position: absolute; top: 12px; left: 12px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; z-index: 2; }
        .badge-normal { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; }
        .badge-inverter { background: linear-gradient(135deg, var(--accent), #0099cc); color: var(--bg); }
        .badge-super { background: linear-gradient(135deg, var(--highlight), #ff8c00); color: var(--bg); }
        
        /* ปุ่มและตัวกรอง */
        .filter-btn { padding: 10px 20px; border-radius: 30px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-weight: 500; cursor: pointer; transition: all 0.3s ease; font-family: 'Prompt', sans-serif; white-space: nowrap; }
        .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0, 212, 255, 0.1); }
        .filter-btn.active { background: linear-gradient(135deg, var(--accent), #0099cc); color: var(--bg); border-color: transparent; box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3); }
        
        /* ราคาและสถานะ */
        .price-tag { font-family: 'Prompt', sans-serif; font-weight: 700; font-size: 1.5rem; color: var(--accent-secondary); }
        .price-tag.no-price { font-size: 1.1rem; color: var(--muted); }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 8px; }
        .status-new { background: rgba(0, 255, 148, 0.2); color: var(--accent-secondary); border: 1px solid var(--accent-secondary); }
        .status-wait { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid #ffc107; }
        
        /* ฟอร์มและ Modal */
        .search-input { background: rgba(15, 40, 71, 0.8); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px 14px 50px; color: var(--fg); width: 100%; max-width: 400px; font-size: 16px; transition: all 0.3s ease; }
        .search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; transform: scale(0.9) translateY(20px); transition: transform 0.3s ease; }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
        .form-input { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--fg); font-size: 15px; transition: all 0.3s ease; }
        .form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
        .form-select { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--fg); font-size: 15px; cursor: pointer; }
        .form-select option { background: var(--bg-secondary); color: var(--fg); }
        
        /* ปุ่มกดต่างๆ */
        .btn-primary { background: linear-gradient(135deg, var(--accent), #0099cc); color: var(--bg); font-weight: 600; padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; transition: all 0.3s ease; font-family: 'Prompt', sans-serif; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3); }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #c0392b); color: white; font-weight: 600; padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; transition: all 0.3s ease; }
        .btn-secondary { background: transparent; color: var(--muted); font-weight: 600; padding: 12px 24px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; transition: all 0.3s ease; }
        .btn-secondary:hover { border-color: var(--muted); color: var(--fg); }
        
        /* ระบบแอดมิน */
        .admin-toggle { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #0099cc); border: none; cursor: pointer; z-index: 50; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4); }
        .admin-toggle.active { background: linear-gradient(135deg, var(--highlight), #ff8c00); box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4); }
        .admin-toggle svg { width: 28px; height: 28px; color: var(--bg); }
        .admin-indicator { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--highlight), var(--accent), var(--highlight)); z-index: 100; display: none; }
        .admin-mode .admin-indicator { display: block; }
        .edit-overlay { position: absolute; inset: 0; background: rgba(255, 215, 0, 0.9); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; z-index: 10; }
        .admin-mode .product-card:hover .edit-overlay { opacity: 1; }
        .edit-overlay svg { width: 40px; height: 40px; color: var(--bg); }
        
        /* แจ้งเตือน */
        .toast { position: fixed; bottom: 100px; right: 24px; background: var(--bg-secondary); border: 1px solid var(--accent-secondary); color: var(--fg); padding: 16px 24px; border-radius: 12px; z-index: 200; transform: translateX(150%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); }
        .toast.show { transform: translateX(0); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>
    <div class="admin-indicator"></div>

    <header class="relative min-h-[35vh] flex items-center justify-center overflow-hidden">
        <div class="hero-bg">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
        </div>
        <div class="grid-pattern"></div>
        
        <div class="relative z-10 text-center px-4 py-10">
            <h1 class="text-5xl md:text-7xl lg:text-8xl font-bold tracking-tight">
                <span class="block text-white mb-2">บุญสม</span>
                <span class="block bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">แอร์เซอร์วิส</span>
            </h1>
            <p class="text-cyan-200 mt-4 text-lg md:text-xl font-light">ตัวแทนจำหน่ายและติดตั้งเครื่องปรับอากาศ</p>
        </div>
    </header>

    <section class="sticky top-0 z-50 bg-gradient-to-b from-[#0a1628] to-[#0a1628]/95 backdrop-blur-lg border-b border-cyan-900/30 py-4">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
                <div class="relative flex-1 max-w-md">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="ค้นหารุ่นแอร์, BTU, แบรนด์...">
                </div>
                <button id="addProductBtn" class="btn-primary hidden">
                    <span class="flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        เพิ่มสินค้า
                    </span>
                </button>
            </div>
            
            <div class="flex flex-nowrap overflow-x-auto pb-2 justify-start md:justify-center gap-2" id="filterContainer">
                <button class="filter-btn active" data-brand="all">ทั้งหมด</button>
                <button class="filter-btn" data-brand="mitsubishi">มิตซูบิชิ</button>
                <button class="filter-btn" data-brand="daikin">ไดกิ้น</button>
                <button class="filter-btn" data-brand="central">เซ็นทรัลแอร์</button>
                <button class="filter-btn" data-brand="carrier">แคเรีย</button>
                <button class="filter-btn" data-brand="haier">ไฮเออร์</button>
                <button class="filter-btn" data-brand="lg">เอลจี</button>
                <button class="filter-btn" data-brand="other">แบรนด์อื่นๆ</button>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        <div id="emptyState" class="hidden text-center py-20">
            <svg class="w-20 h-20 mx-auto text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <p class="text-gray-400 text-lg">ไม่พบรุ่นที่ค้นหา</p>
        </div>
    </main>

    <button id="adminToggle" class="admin-toggle" title="เปิด/ปิดโหมดแก้ไข">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
    </button>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <div class="p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-white font-[Prompt]" id="modalTitle">เพิ่ม/แก้ไขสินค้า</h2>
                    <button id="closeModal" type="button" class="text-gray-400 hover:text-white transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                
                <form id="productForm">
                    <input type="hidden" id="productId">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="form-label">แบรนด์</label>
                            <select id="brandInput" class="form-select" required>
                                <option value="mitsubishi">มิตซูบิชิ (Mitsubishi)</option>
                                <option value="daikin">ไดกิ้น (Daikin)</option>
                                <option value="central">เซ็นทรัลแอร์ (Central Air)</option>
                                <option value="carrier">แคเรีย (Carrier)</option>
                                <option value="haier">ไฮเออร์ (Haier)</option>
                                <option value="lg">เอลจี (LG)</option>
                                <option value="other">อื่นๆ</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">ชื่อแบรนด์ (แสดงในการ์ด)</label>
                            <input type="text" id="brandNameInput" class="form-input" placeholder="เช่น Mitsubishi Heavy Duty" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">ชื่อรุ่น</label>
                        <input type="text" id="modelInput" class="form-input" placeholder="เช่น SRK10YYP-W1" required>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="form-label text-emerald-400">ขนาด BTU</label>
                            <input type="text" id="btuInput" class="form-input border-emerald-500/50" placeholder="เช่น 9000">
                        </div>
                        <div>
                            <label class="form-label text-emerald-400">ขนาดห้อง (ตร.ม.)</label>
                            <input type="text" id="roomSizeInput" class="form-input border-emerald-500/50" placeholder="เช่น 9-14">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="form-label">ราคา (บาท) - ใส่ 0 ถ้ารอสอบถาม</label>
                            <input type="number" id="priceInput" class="form-input" required>
                        </div>
                        <div>
                            <label class="form-label">สถานะสินค้า</label>
                            <select id="statusInput" class="form-select">
                                <option value="">ปกติ (ไม่แสดงป้าย)</option>
                                <option value="new">มาใหม่ (NEW)</option>
                                <option value="wait">รอของ</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-cyan-400">ลิงก์รูปภาพสินค้า (URL) - ไม่บังคับ</label>
                        <input type="text" id="imageInput" class="form-input border-cyan-500/50" placeholder="เช่น https://postimg.cc/your-image.jpg">
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="form-label">ระบบแอร์</label>
                            <select id="typeInput" class="form-select">
                                <option value="normal">ธรรมดา (Fixed Speed)</option>
                                <option value="inverter">Inverter</option>
                                <option value="super">Super Inverter</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">ป้ายระบบ (แสดงในการ์ด)</label>
                            <input type="text" id="typeLabelInput" class="form-input" placeholder="เช่น INVERTER">
                        </div>
                    </div>
                    
                    <div class="flex gap-3 pt-4 border-t border-cyan-900/50">
                        <button type="submit" class="btn-primary flex-1">บันทึกข้อมูล</button>
                        <button type="button" id="deleteBtn" class="btn-danger hidden">ลบสินค้านี้</button>
                        <button type="button" id="cancelBtn" class="btn-secondary">ยกเลิก</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <span id="toastMessage">บันทึกสำเร็จ!</span>
    </div>

    <script>
        const ADMIN_PASSWORD = "4321";

        // =========================================================================
        // 1. นำข้อมูลที่ก๊อปปี้มาจากหน้า Console (ไฟล์เก่า) มาวางแทนที่เครื่องหมาย [] ตรงนี้
        // =========================================================================
        const defaultProducts = []; 
        // =========================================================================

        // 2. โหลดข้อมูล โดยเช็คว่าถ้าในเครื่องไม่มีข้อมูล ให้ใช้ defaultProducts แทน
        let products = JSON.parse(localStorage.getItem('air_products_v2'));

        if (!products || products.length === 0) {
            products = defaultProducts;
            // บันทึกลงเครื่องอัตโนมัติเพื่อให้รอบหน้าเปิดมาโหลดเร็วขึ้น
            localStorage.setItem('air_products_v2', JSON.stringify(products));
        }

        let isAdmin = sessionStorage.getItem('isAdmin') === 'true';
        let currentFilter = 'all';
        let searchQuery = '';

        const productsGrid = document.getElementById('productsGrid');
        const emptyState = document.getElementById('emptyState');
        const adminToggle = document.getElementById('adminToggle');
        const addProductBtn = document.getElementById('addProductBtn');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const editModal = document.getElementById('editModal');
        const productForm = document.getElementById('productForm');

        const formatPrice = (num) => new Intl.NumberFormat('th-TH').format(num);

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function checkAdminAccess() {
            if (!isAdmin) {
                const password = prompt("กรุณาใส่รหัสผ่านเพื่อเข้าสู่โหมดแอดมิน:");
                if (password === ADMIN_PASSWORD) {
                    isAdmin = true;
                    sessionStorage.setItem('isAdmin', 'true');
                    enableAdminMode();
                    showToast("เข้าสู่โหมดแอดมินแล้ว");
                } else if (password !== null) alert("รหัสผ่านไม่ถูกต้อง!");
            } else {
                isAdmin = false;
                sessionStorage.removeItem('isAdmin');
                disableAdminMode();
                showToast("ออกจากโหมดแอดมินแล้ว");
            }
        }

        function enableAdminMode() {
            document.body.classList.add('admin-mode');
            adminToggle.classList.add('active');
            addProductBtn.classList.remove('hidden');
            renderProducts();
        }

        function disableAdminMode() {
            document.body.classList.remove('admin-mode');
            adminToggle.classList.remove('active');
            addProductBtn.classList.add('hidden');
            renderProducts();
        }

        adminToggle.addEventListener('click', checkAdminAccess);

        function saveProducts() {
            localStorage.setItem('air_products_v2', JSON.stringify(products));
        }

        function renderProducts() {
            const filtered = products.filter(p => {
                const matchBrand = currentFilter === 'all' || p.brand === currentFilter;
                const searchLower = searchQuery.toLowerCase();
                const matchSearch = p.model.toLowerCase().includes(searchLower) || 
                                    p.brandName.toLowerCase().includes(searchLower) ||
                                    (p.btu && p.btu.toString().includes(searchLower));
                return matchBrand && matchSearch;
            });

            if (filtered.length === 0) {
                productsGrid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            productsGrid.innerHTML = filtered.map(p => {
                const badgeClass = p.type === 'normal' ? 'badge-normal' : 
                                  p.type === 'super' ? 'badge-super' : 'badge-inverter';
                
                let statusHtml = '';
                if(p.status === 'new') statusHtml = '<span class="status-badge status-new">NEW</span>';
                if(p.status === 'wait') statusHtml = '<span class="status-badge status-wait">รอของ</span>';

                const priceDisplay = p.price > 0 ? `฿${formatPrice(p.price)}` : 'สอบถามราคา';
                const priceClass = p.price > 0 ? 'price-tag' : 'price-tag no-price';

                const defaultImg = `https://via.placeholder.com/400x300/0f2847/00d4ff?text=${p.brandName}`;
                const imgSrc = p.imageUrl ? p.imageUrl : defaultImg;
                
                const imgClass = p.imageUrl ? 'w-full h-full object-cover transition-transform duration-700 group-hover:scale-110' : 'w-full h-full object-contain p-6 transition-transform duration-700 group-hover:scale-110';

                let specTags = '';
                if (p.btu || p.roomSize) {
                    specTags = `<div class="flex flex-wrap gap-2 mt-3 mb-1">`;
                    if (p.btu) {
                        specTags += `<span class="text-xs font-medium bg-cyan-900/40 text-cyan-300 px-2 py-1 rounded border border-cyan-800/50 flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            ${p.btu} BTU
                        </span>`;
                    }
                    if (p.roomSize) {
                        specTags += `<span class="text-xs font-medium bg-emerald-900/40 text-emerald-300 px-2 py-1 rounded border border-emerald-800/50 flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l-5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
                            ${p.roomSize} ตร.ม.
                        </span>`;
                    }
                    specTags += `</div>`;
                }

                return `
                    <div class="product-card group" onclick="openEditModal(${p.id})">
                        <div class="type-badge ${badgeClass}">${p.typeLabel}</div>
                        <div class="product-image">
                            <img src="${imgSrc}" class="${imgClass}" alt="${p.model}" loading="lazy">
                        </div>
                        <div class="p-5 flex-1 flex flex-col">
                            <div class="flex-1">
                                <h3 class="text-gray-400 text-sm font-medium uppercase tracking-wider">${p.brandName}</h3>
                                <h2 class="text-xl font-bold text-white mt-1 leading-tight">${p.model}</h2>
                                ${specTags}
                            </div>
                            <div class="flex items-end justify-between mt-4 pt-4 border-t border-cyan-900/30">
                                <div class="${priceClass}">${priceDisplay}</div>
                                ${statusHtml}
                            </div>
                        </div>
                        <div class="edit-overlay">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openEditModal(id = null) {
            if (!isAdmin) return;
            editModal.classList.add('active');
            
            if (id) {
                document.getElementById('modalTitle').textContent = 'แก้ไขข้อมูลแอร์';
                const product = products.find(p => p.id === id);
                document.getElementById('productId').value = product.id;
                document.getElementById('brandInput').value = product.brand;
                document.getElementById('brandNameInput').value = product.brandName;
                document.getElementById('modelInput').value = product.model;
                document.getElementById('btuInput').value = product.btu || '';
                document.getElementById('roomSizeInput').value = product.roomSize || '';
                document.getElementById('priceInput').value = product.price;
                document.getElementById('typeInput').value = product.type;
                document.getElementById('typeLabelInput').value = product.typeLabel;
                document.getElementById('statusInput').value = product.status || '';
                document.getElementById('imageInput').value = product.imageUrl || '';
                
                document.getElementById('deleteBtn').classList.remove('hidden');
            } else {
                document.getElementById('modalTitle').textContent = 'เพิ่มแอร์รุ่นใหม่';
                productForm.reset();
                document.getElementById('productId').value = '';
                document.getElementById('priceInput').value = 0;
                document.getElementById('imageInput').value = '';
                document.getElementById('deleteBtn').classList.add('hidden');
            }
        }

        function closeModal() { editModal.classList.remove('active'); }

        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('cancelBtn').addEventListener('click', closeModal);

        productForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            let imgUrl = document.getElementById('imageInput').value.trim();
            
            const newProduct = {
                id: id ? parseInt(id) : Date.now(),
                brand: document.getElementById('brandInput').value,
                brandName: document.getElementById('brandNameInput').value,
                model: document.getElementById('modelInput').value,
                btu: document.getElementById('btuInput').value.trim(),
                roomSize: document.getElementById('roomSizeInput').value.trim(),
                price: parseFloat(document.getElementById('priceInput').value) || 0,
                type: document.getElementById('typeInput').value,
                typeLabel: document.getElementById('typeLabelInput').value,
                status: document.getElementById('statusInput').value,
                imageUrl: imgUrl
            };

            if (id) {
                const index = products.findIndex(p => p.id === parseInt(id));
                products[index] = newProduct;
                showToast("อัปเดตข้อมูลสำเร็จ");
            } else {
                products.push(newProduct);
                showToast("เพิ่มสินค้าสำเร็จ");
            }

            saveProducts();
            renderProducts();
            closeModal();
        });

        document.getElementById('deleteBtn').addEventListener('click', () => {
            if(confirm("ต้องการลบสินค้านี้ใช่หรือไม่?")) {
                const id = document.getElementById('productId').value;
                products = products.filter(p => p.id !== parseInt(id));
                saveProducts();
                renderProducts();
                closeModal();
                showToast("ลบสินค้าสำเร็จ");
            }
        });

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderProducts();
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.brand;
                renderProducts();
            });
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (isAdmin) enableAdminMode();
            renderProducts();
        });
    </script>
</body>
</html>
