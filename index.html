<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Money 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS: แต่งหน้าตาให้คิวท์ ลื่นไหล และ Responsive */
        :root {
            --bg-color: #f7f9fc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --primary: #a8b2ff;
            --income: #b5e48c;
            --expense: #ffb4a2;
            --text-dark: #4a4e69;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: var(--text-dark);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 20px;
        }

        .balance-card {
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 600;
            margin: 10px 0 0 0;
        }

        .form-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        #type { flex: 1; }
        #amount { flex: 1.5; }

        input, select {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: #f0f2f5;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            outline: none;
            transition: 0.3s ease;
        }

        input:focus, select:focus {
            background: #fff;
            box-shadow: 0 0 0 2px var(--primary);
        }

        #note {
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: var(--primary);
            color: white;
            font-family: 'Prompt', sans-serif;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-bottom: 30px;
        }

        button:active {
            transform: scale(0.95);
        }

        h3 {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .history-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }

        .history-list::-webkit-scrollbar { width: 5px; }
        .history-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: white;
            border-radius: 20px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            animation: slideIn 0.3s ease;
            font-size: 15px;
        }

        .item.plus { border-left: 6px solid var(--income); }
        .item.minus { border-left: 6px solid var(--expense); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media screen and (max-width: 480px) {
            .container {
                padding: 25px 20px;
                border-radius: 30px;
            }
            .balance-amount { font-size: 30px; }
            .form-group {
                flex-direction: column;
                gap: 10px;
            }
            #type, #amount { width: 100%; }
            input, select, button {
                padding: 14px;
                font-size: 15px;
            }
            .item {
                padding: 14px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Money 💸</h1>
        
        <div class="balance-card">
            <div>ยอดเงินคงเหลือ</div>
            <div class="balance-amount" id="balance">฿0.00</div>
        </div>

        <form id="transaction-form">
            <div class="form-group">
                <select id="type">
                    <option value="minus">รายจ่าย 📤</option>
                    <option value="plus">รายรับ 📥</option>
                </select>
                <input type="number" id="amount" placeholder="จำนวนเงิน" required min="1" step="any">
            </div>
            
            <input type="text" id="note" list="note-suggestions" placeholder="จดไว้หน่อยว่าค่าอะไร..." required autocomplete="off">
            
            <datalist id="note-suggestions">
                </datalist>

            <button type="submit">บันทึกข้อมูล ✨</button>
        </form>

        <h3>ประวัติล่าสุด</h3>
        <ul class="history-list" id="list">
            </ul>
    </div>

    <script>
        const form = document.getElementById('transaction-form');
        const balanceDisplay = document.getElementById('balance');
        const list = document.getElementById('list');
        const datalist = document.getElementById('note-suggestions');

        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        // ลิสต์คำฮิตเริ่มต้น (Gen Z Starter Pack)
        const defaultSuggestions = [
            "ชาไข่มุก 🧋", "หมูกระทะ 🥓", "ค่าเดินทาง 🚝", 
            "ช้อปปิ้ง 🛍️", "ค่าเน็ต/โทรศัพท์ 📱", "เงินเดือน 💰", 
            "ขนมจุกจิก 🍫", "กาแฟ ☕", "โอนให้เพื่อน 💸"
        ];

        // ฟังก์ชันอัปเดตระบบเดาคำ
        function updateSuggestions() {
            datalist.innerHTML = ''; // ล้างของเก่าก่อน
            
            // ดึงคำจากประวัติเก่าๆ มา (เฉพาะคำที่ไม่ซ้ำกัน)
            const pastNotes = transactions.map(t => t.note);
            
            // รวมคำฮิต + คำจากประวัติ และตัดคำที่ซ้ำกันออก (ด้วย Set)
            const allSuggestions = [...new Set([...defaultSuggestions, ...pastNotes])];

            // สร้าง <option> ใส่เข้าไปใน datalist
            allSuggestions.forEach(note => {
                const option = document.createElement('option');
                option.value = note;
                datalist.appendChild(option);
            });
        }

        function updateUI() {
            list.innerHTML = '';
            let total = 0;

            transactions.forEach(t => {
                if (t.type === 'plus') total += t.amount;
                else total -= t.amount;

                const li = document.createElement('li');
                li.classList.add('item', t.type);
                li.innerHTML = `
                    <span style="flex: 1; word-break: break-word; padding-right: 10px;">${t.note}</span>
                    <span style="color: ${t.type === 'plus' ? '#7cb55e' : '#e07a64'}; font-weight: 600; white-space: nowrap;">
                        ${t.type === 'plus' ? '+' : '-'}฿${t.amount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                    </span>
                `;
                list.prepend(li);
            });

            balanceDisplay.innerText = `฿${total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            // เรียกใช้อัปเดตคำเดาด้วยทุกครั้งที่มีการอัปเดตหน้าจอ
            updateSuggestions();
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const type = document.getElementById('type').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const note = document.getElementById('note').value;

            transactions.push({ id: Date.now(), type, amount, note, date: new Date().toISOString() });
            localStorage.setItem('transactions', JSON.stringify(transactions));

            form.reset();
            updateUI();
        });

        updateUI();
    </script>
</body>
</html>
