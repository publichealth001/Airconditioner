<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บุญสมบุญสมแอร์ | ระบบจัดการข้อมูล (Full Support)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f4f8; }
        .modal { display: none; }
        .modal.active { display: flex; }
        
        .scroll-container {
            display: flex; gap: 0.5rem; overflow-x: auto;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch; padding-bottom: 5px;
        }
        @media (min-width: 1024px) {
            .scroll-container::-webkit-scrollbar { height: 4px; }
            .scroll-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
            .scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        }
        @media (max-width: 1023px) {
            .scroll-container::-webkit-scrollbar { display: none; }
        }

        .brand-btn.active { background-color: #1d4ed8; color: white; border-color: #1d4ed8; box-shadow: 0 4px 10px rgba(29, 78, 216, 0.3); }
        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .img-nav-btn {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(4px);
            width: 32px; height: 32px; display: flex; items-center: center; justify-content: center;
            border-radius: 50%; border: 1px solid #eee; transition: all 0.2s; opacity: 0;
        }
        .product-card:hover .img-nav-btn { opacity: 1; }
        .img-nav-btn:hover { background: white; transform: scale(1.1); }
    </style>
</head>
<body class="text-slate-800">

    <div id="loader" class="fixed inset-0 bg-white z-[100] flex flex-col justify-center items-center">
        <div class="animate-spin rounded-full h-14 w-14 border-t-4 border-blue-600 mb-4"></div>
        <p class="text-slate-500">กำลังโหลดข้อมูลแอร์...</p>
    </div>

    <header class="bg-gradient-to-r from-blue-800 to-blue-600 text-white shadow-xl sticky top-0 z-40">
        <div class="container mx-auto px-4 py-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-white p-2 rounded-2xl shadow-lg text-3xl">❄️</div>
                <div>
                    <h1 class="text-xl md:text-2xl font-extrabold tracking-tight leading-none">บุญสมบุญสมแอร์</h1>
                    <p class="text-[10px] text-blue-100 opacity-80 uppercase tracking-widest mt-1">Professional Service</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="addBtn" onclick="openAddModal()" class="hidden bg-green-500 hover:bg-green-600 px-4 py-2 rounded-xl text-xs font-bold shadow-lg transition-all active:scale-95">
                    ➕ เพิ่มรุ่นแอร์
                </button>
                <button id="adminBtn" onclick="toggleAdmin()" class="bg-white/10 hover:bg-white/30 backdrop-blur-md px-4 py-2 rounded-xl text-xs font-bold border border-white/20 transition-all active:scale-95">
                    🔒 แอดมิน
                </button>
            </div>
        </div>
    </header>

    <nav class="bg-white/90 backdrop-blur-md shadow-sm border-b sticky top-[84px] z-30">
        <div class="container mx-auto px-4 py-3 relative">
            <div id="brand-filters" class="scroll-container px-2 py-1"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10 min-h-screen">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <div id="editModal" class="modal fixed inset-0 bg-slate-900/80 backdrop-blur-md justify-center items-center z-50 p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 id="modalTitle" class="text-2xl font-bold">🛠️ จัดการข้อมูลแอร์</h2>
                <button onclick="closeModal('editModal')" class="text-slate-400 text-2xl">✕</button>
            </div>
            <input type="hidden" id="editId">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2"><label class="text-xs font-black text-slate-400 mb-1 block">ยี่ห้อ</label><input type="text" id="editBrand" class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500"></div>
                <div class="md:col-span-2"><label class="text-xs font-black text-slate-400 mb-1 block">หมวดหมู่</label><input type="text" id="editCategory" class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500"></div>
                <div class="md:col-span-2"><label class="text-xs font-black text-slate-400 mb-1 block">ชื่อรุ่น / รหัส</label><input type="text" id="editModel" class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500 font-bold bg-slate-50"></div>
                <div><label class="text-xs font-black text-slate-400 mb-1 block">ราคา</label><input type="text" id="editPrice" class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500 font-bold"></div>
                <div><label class="text-xs font-black text-slate-400 mb-1 block">BTU</label><input type="text" id="editBtu" class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500"></div>
                <div class="md:col-span-2"><label class="text-xs font-black text-slate-400 mb-1 block">ขนาดห้อง (ตร.ม.)</label><input type="text" id="editRoom" class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500"></div>
                <div class="md:col-span-2"><label class="text-xs font-black text-slate-400 mb-1 block">ลิงก์รูปภาพ (ขึ้นบรรทัดใหม่เพื่อใส่หลายรูป)</label><textarea id="editImgs" rows="4" class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500 text-xs"></textarea></div>
                
                <div class="md:col-span-2"><label class="text-xs font-black text-slate-400 mb-1 block">รายละเอียดเพิ่มเติม / โปรโมชั่น</label><textarea id="editDetail" rows="3" class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500" placeholder="เช่น แถมฟรีท่อน้ำยา, รับประกัน 10 ปี..."></textarea></div>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="closeModal('editModal')" class="flex-1 py-4 font-bold text-slate-400">ยกเลิก</button>
                <button id="saveBtn" onclick="saveData()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95">💾 บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal fixed inset-0 bg-slate-900/70 backdrop-blur-sm justify-center items-center z-50 p-4">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-6">ผู้ดูแลระบบ</h2>
            <input type="password" id="adminPassword" class="w-full border-2 border-slate-100 p-4 rounded-2xl mb-6 text-center text-2xl tracking-[0.5em] outline-none" placeholder="••••">
            <button onclick="checkPassword()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95">เข้าสู่ระบบ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdnDcProI1UFW2a9eGiUJbLYmI7ihM1XQ",
            authDomain: "boonsomair-3f5b0.firebaseapp.com",
            projectId: "boonsomair-3f5b0",
            storageBucket: "boonsomair-3f5b0.firebasestorage.app",
            messagingSenderId: "831800219771",
            appId: "1:831800219771:web:97243e82b452a14e0a2ade"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let products = [];
        let isAdmin = false;
        let currentBrand = "ทั้งหมด";
        let productImagesState = {}; 
        const fallbackImg = "https://images.unsplash.com/photo-1620288627223-53302f4e8c74?q=80&w=600";

        async function loadData() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                products = [];
                querySnapshot.forEach((doc) => { products.push({ id: doc.id, ...doc.data() }); });
                document.getElementById('loader').classList.add('hidden');
                renderBrands();
                renderProducts();
                initMouseScroll();
            } catch (e) { console.error(e); }
        }

        function initMouseScroll() {
            const scrollContainer = document.querySelector(".scroll-container");
            if(scrollContainer) {
                scrollContainer.addEventListener("wheel", (evt) => {
                    evt.preventDefault();
                    scrollContainer.scrollLeft += evt.deltaY;
                });
            }
        }

        function renderBrands() {
            const container = document.getElementById('brand-filters');
            const brands = ["ทั้งหมด", ...new Set(products.map(p => p.brand))];
            container.innerHTML = brands.map(b => `
                <button onclick="window.setBrand('${b}')" class="brand-btn whitespace-nowrap px-8 py-3 rounded-2xl border-2 font-bold transition-all text-sm ${currentBrand === b ? 'active' : 'bg-white border-slate-100 text-slate-500 hover:bg-slate-50'}">${b}</button>
            `).join('');
        }

        window.setBrand = (brand) => { currentBrand = brand; renderBrands(); renderProducts(); };

        window.changeImg = (prodId, direction) => {
            const product = products.find(p => p.id === prodId);
            if (!product || !product.imgs || product.imgs.length <= 1) return;
            let currentIndex = productImagesState[prodId] || 0;
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = product.imgs.length - 1;
            if (currentIndex >= product.imgs.length) currentIndex = 0;
            productImagesState[prodId] = currentIndex;
            const imgElement = document.getElementById(`img-${prodId}`);
            const counterElement = document.getElementById(`count-${prodId}`);
            let rawUrl = product.imgs[currentIndex];
            let proxyUrl = `https://wsrv.nl/?url=${encodeURIComponent(rawUrl)}&w=600&h=450&fit=contain&trim=15&output=webp`;
            imgElement.src = proxyUrl;
            counterElement.innerText = `${currentIndex + 1} / ${product.imgs.length}`;
        };

        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            let filtered = currentBrand === "ทั้งหมด" ? products : products.filter(p => p.brand === currentBrand);
            
            const grouped = filtered.reduce((acc, curr) => {
                if (!acc[curr.category]) acc[curr.category] = [];
                acc[curr.category].push(curr);
                return acc;
            }, {});

            for (const [category, items] of Object.entries(grouped)) {
                container.innerHTML += `<div class="col-span-full mt-10 mb-6 flex items-center gap-4">
                    <h2 class="text-2xl font-black text-slate-800">${category}</h2>
                    <div class="h-[2px] flex-grow bg-blue-100"></div>
                </div>`;
                
                items.forEach(p => {
                    let imgList = p.imgs && Array.isArray(p.imgs) ? p.imgs : (p.img ? [p.img] : [fallbackImg]);
                    p.imgs = imgList; 
                    const currentIndex = productImagesState[p.id] || 0;
                    let displayImg = imgList[currentIndex];
                    if (displayImg.startsWith('http') && !displayImg.includes('firebasestorage')) {
                        displayImg = `https://wsrv.nl/?url=${encodeURIComponent(displayImg)}&w=600&h=450&fit=contain&trim=15&output=webp`;
                    }

                    container.innerHTML += `
                        <div class="product-card bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden flex flex-col group relative">
                            <div class="h-64 bg-slate-50 flex items-center justify-center p-8 relative overflow-hidden">
                                <img id="img-${p.id}" src="${displayImg}" onerror="this.src='${fallbackImg}'" class="max-h-full max-w-full object-contain mix-blend-multiply">
                                <span class="absolute top-6 left-6 bg-blue-600 text-white px-4 py-1 rounded-xl text-[10px] font-black uppercase shadow-lg">${p.brand}</span>
                                ${imgList.length > 1 ? `
                                    <div class="absolute inset-x-4 top-1/2 -translate-y-1/2 flex justify-between items-center pointer-events-none">
                                        <button onclick="changeImg('${p.id}', -1)" class="img-nav-btn pointer-events-auto shadow-md">❮</button>
                                        <button onclick="changeImg('${p.id}', 1)" class="img-nav-btn pointer-events-auto shadow-md">❯</button>
                                    </div>
                                    <div id="count-${p.id}" class="absolute bottom-4 right-6 bg-black/10 px-2 py-1 rounded-lg text-[9px] font-bold text-slate-500">${currentIndex + 1} / ${imgList.length}</div>
                                ` : ''}
                            </div>
                            <div class="p-8 flex-grow flex flex-col">
                                <h3 class="font-bold text-slate-800 text-lg mb-4 leading-tight min-h-[3rem] line-clamp-2">${p.model}</h3>
                                <div class="grid grid-cols-2 gap-2 mb-4">
                                    <div class="bg-blue-50 p-3 rounded-2xl text-center"><p class="text-[10px] font-bold text-blue-400 uppercase">BTU</p><p class="text-sm font-black text-blue-700">${p.btu || '-'}</p></div>
                                    <div class="bg-emerald-50 p-3 rounded-2xl text-center"><p class="text-[10px] font-bold text-emerald-400 uppercase">ตร.ม.</p><p class="text-sm font-black text-emerald-700">${p.room || '-'}</p></div>
                                </div>
                                
                                ${p.detail ? `<p class="text-xs text-slate-500 mb-6 bg-slate-50 p-3 rounded-xl border border-slate-100 italic line-clamp-3">"${p.detail}"</p>` : ''}

                                <div class="mt-auto flex justify-between items-end">
                                    <p class="text-blue-600 font-black text-3xl tracking-tighter">฿${p.price}</p>
                                    <div class="bg-slate-100 p-3 rounded-2xl">❄️</div>
                                </div>
                            </div>
                            ${isAdmin ? `
                                <div class="px-8 pb-8 flex gap-2">
                                    <button onclick="openEditModal('${p.id}')" class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold text-xs">🔧 แก้ไข</button>
                                    <button onclick="deleteProduct('${p.id}')" class="w-12 bg-red-100 text-red-600 py-3 rounded-xl hover:bg-red-200">🗑️</button>
                                </div>` : ''}
                        </div>`;
                });
            }
        }

        window.openAddModal = () => {
            document.getElementById('modalTitle').innerText = "➕ เพิ่มรุ่นแอร์ใหม่";
            document.getElementById('editId').value = ""; document.getElementById('editBrand').value = "";
            document.getElementById('editCategory').value = ""; document.getElementById('editModel').value = "";
            document.getElementById('editPrice').value = ""; document.getElementById('editImgs').value = "";
            document.getElementById('editBtu').value = ""; document.getElementById('editRoom').value = "";
            document.getElementById('editDetail').value = ""; document.getElementById('editModal').classList.add('active');
        };

        window.openEditModal = (id) => {
            const p = products.find(prod => prod.id === id);
            if(p) {
                document.getElementById('modalTitle').innerText = "✏️ แก้ไขข้อมูลแอร์";
                document.getElementById('editId').value = p.id;
                document.getElementById('editBrand').value = p.brand || "";
                document.getElementById('editCategory').value = p.category || "";
                document.getElementById('editModel').value = p.model;
                document.getElementById('editPrice').value = p.price;
                document.getElementById('editImgs').value = p.imgs ? p.imgs.join('\n') : (p.img || "");
                document.getElementById('editBtu').value = p.btu || '';
                document.getElementById('editRoom').value = p.room || '';
                document.getElementById('editDetail').value = p.detail || '';
                document.getElementById('editModal').classList.add('active');
            }
        };

        window.saveData = async () => {
            const id = document.getElementById('editId').value;
            const btn = document.getElementById('saveBtn');
            const imgArray = document.getElementById('editImgs').value.split(/[\n,]+/).map(url => url.trim()).filter(url => url !== "");
            const data = {
                brand: document.getElementById('editBrand').value,
                category: document.getElementById('editCategory').value,
                model: document.getElementById('editModel').value,
                price: document.getElementById('editPrice').value,
                imgs: imgArray,
                btu: document.getElementById('editBtu').value,
                room: document.getElementById('editRoom').value,
                detail: document.getElementById('editDetail').value
            };
            btn.innerText = "⏳ กำลังบันทึก..."; btn.disabled = true;
            try {
                if (id) await updateDoc(doc(db, "products", id), data);
                else await addDoc(collection(db, "products"), data);
                await loadData(); closeModal('editModal');
            } catch (e) { alert('ผิดพลาด'); }
            finally { btn.innerText = "💾 บันทึกข้อมูล"; btn.disabled = false; }
        };

        window.deleteProduct = async (id) => {
            if (confirm('ยืนยันว่าจะลบแอร์รุ่นนี้?')) {
                await deleteDoc(doc(db, "products", id));
                loadData();
            }
        };

        window.toggleAdmin = () => isAdmin ? location.reload() : document.getElementById('loginModal').classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        window.checkPassword = () => {
            if(document.getElementById('adminPassword').value === '4321') {
                isAdmin = true; closeModal('loginModal'); 
                document.getElementById('adminBtn').innerText = "🔓 ออกระบบ";
                document.getElementById('adminBtn').classList.replace('bg-white/10', 'bg-red-500');
                document.getElementById('addBtn').classList.remove('hidden');
                renderProducts();
            } else alert('รหัสผิด');
        };

        loadData();
    </script>
</body>
</html>
