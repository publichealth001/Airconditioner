<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Money 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS: แต่งหน้าตาให้คิวท์และลื่นไหล */
        :root {
            --bg-color: #f7f9fc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --primary: #a8b2ff;
            --income: #b5e48c;
            --expense: #ffb4a2;
            --text-dark: #4a4e69;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-top: 0;
        }

        .balance-card {
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 600;
            margin: 10px 0;
        }

        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 18px;
            background: #f0f2f5;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            outline: none;
            transition: 0.3s ease;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            background: #fff;
            box-shadow: 0 0 0 2px var(--primary);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 18px;
            background: var(--primary);
            color: white;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-bottom: 25px;
        }

        button:active {
            transform: scale(0.95); /* แอนิเมชันปุ่มบุ๋มลงไปแบบ iOS */
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 250px;
            overflow-y: auto;
        }

        .history-list::-webkit-scrollbar {
            width: 5px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: white;
            border-radius: 20px;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            animation: slideIn 0.3s ease;
        }

        .item.plus { border-left: 5px solid var(--income); }
        .item.minus { border-left: 5px solid var(--expense); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Money 💸</h1>
        
        <div class="balance-card">
            <div>ยอดเงินคงเหลือ</div>
            <div class="balance-amount" id="balance">฿0.00</div>
        </div>

        <form id="transaction-form">
            <div class="form-group">
                <select id="type">
                    <option value="plus">รายรับ 📥</option>
                    <option value="minus">รายจ่าย 📤</option>
                </select>
                <input type="number" id="amount" placeholder="จำนวนเงิน" required min="1">
            </div>
            <input type="text" id="note" placeholder="จดไว้หน่อยว่าค่าอะไร..." required style="margin-bottom: 15px;">
            <button type="submit">บันทึกข้อมูล ✨</button>
        </form>

        <h3>ประวัติล่าสุด</h3>
        <ul class="history-list" id="list">
            </ul>
    </div>

    <script>
        // JavaScript: สมองของเว็บ
        const form = document.getElementById('transaction-form');
        const balanceDisplay = document.getElementById('balance');
        const list = document.getElementById('list');

        // ดึงข้อมูลเก่าจาก Local Storage (ถ้ามี) หรือสร้าง Array ว่าง
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        // ฟังก์ชันอัปเดตหน้าจอ
        function updateUI() {
            list.innerHTML = '';
            let total = 0;

            transactions.forEach(t => {
                // คำนวณยอดรวม
                if (t.type === 'plus') total += t.amount;
                else total -= t.amount;

                // สร้างกล่องประวัติ
                const li = document.createElement('li');
                li.classList.add('item', t.type);
                li.innerHTML = `
                    <span>${t.note}</span>
                    <span style="color: ${t.type === 'plus' ? '#7cb55e' : '#e07a64'}; font-weight: 600;">
                        ${t.type === 'plus' ? '+' : '-'}฿${t.amount.toLocaleString()}
                    </span>
                `;
                list.prepend(li); // เอาของใหม่ไว้บนสุด
            });

            // อัปเดตยอดคงเหลือ
            balanceDisplay.innerText = `฿${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        // เมื่อกดปุ่มบันทึก
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // ป้องกันเว็บรีเฟรช

            const type = document.getElementById('type').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const note = document.getElementById('note').value;

            // เก็บข้อมูลลง Array
            transactions.push({ id: Date.now(), type, amount, note, date: new Date().toISOString() });

            // สั่งให้เบราว์เซอร์จำข้อมูลไว้ (รีเฟรชแล้วไม่หาย)
            localStorage.setItem('transactions', JSON.stringify(transactions));

            // เคลียร์ช่องกรอกข้อมูล และอัปเดตหน้าจอ
            form.reset();
            updateUI();
        });

        // โหลดข้อมูลตอนเปิดเว็บครั้งแรก
        updateUI();
    </script>
</body>
</html>
