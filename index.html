<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บุญสมบุญสมแอร์เซอร์วิส | ติดตั้ง ล้าง ซ่อมแอร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0fdfa; /* สีฟ้าน้ำทะเลอ่อนๆ */ }
        .modal { display: none; }
        .modal.active { display: flex; }
        
        /* ซ่อน scrollbar สำหรับเมนูยี่ห้อแอร์ แต่ยังเลื่อนได้ */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .brand-btn.active { background-color: #1e3a8a; color: white; border-color: #1e3a8a; }
    </style>
</head>
<body>

    <header class="bg-gradient-to-r from-blue-700 via-blue-500 to-cyan-500 text-white shadow-lg sticky top-0 z-10">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-3xl">❄️</span>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold leading-tight">บุญสมบุญสมแอร์เซอร์วิส</h1>
                    <p class="text-xs md:text-sm text-cyan-100">จำหน่าย ติดตั้ง ล้าง ซ่อม ย้าย แอร์ทุกยี่ห้อ</p>
                </div>
            </div>
            <button id="adminBtn" onclick="toggleAdmin()" class="bg-white/20 hover:bg-white/30 backdrop-blur-sm border border-white/50 text-white px-3 py-1.5 md:px-4 md:py-2 rounded-full text-xs md:text-sm transition duration-300 shadow-sm">
                🔒 เข้าสู่ระบบ
            </button>
        </div>
    </header>

    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="container mx-auto px-4 py-3">
            <h2 class="text-sm font-semibold text-gray-500 mb-2 uppercase tracking-wider">เลือกยี่ห้อแอร์</h2>
            <div id="brand-filters" class="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
                </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 min-h-screen">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <footer class="bg-slate-800 text-white py-6 text-center">
        <p>© 2026 บุญสมบุญสมแอร์เซอร์วิส. All rights reserved.</p>
    </footer>

    <div id="loginModal" class="modal fixed inset-0 bg-black/60 backdrop-blur-sm justify-center items-center z-50">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-96 transform transition-all">
            <div class="text-center mb-6">
                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                    <span class="text-2xl">🔒</span>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">โหมดผู้ดูแลระบบ</h2>
                <p class="text-sm text-gray-500">กรุณาใส่รหัสผ่านเพื่อแก้ไขข้อมูล</p>
            </div>
            <input type="password" id="adminPassword" placeholder="รหัสผ่าน" class="w-full border-2 border-gray-200 focus:border-blue-500 outline-none p-3 rounded-xl mb-6 text-center text-lg tracking-widest">
            <div class="flex justify-end gap-3">
                <button onclick="closeModal('loginModal')" class="flex-1 bg-gray-100 text-gray-700 px-4 py-3 rounded-xl hover:bg-gray-200 font-semibold transition">ยกเลิก</button>
                <button onclick="checkPassword()" class="flex-1 bg-blue-600 text-white px-4 py-3 rounded-xl hover:bg-blue-700 font-semibold shadow-lg shadow-blue-600/30 transition">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal fixed inset-0 bg-black/60 backdrop-blur-sm justify-center items-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-bold mb-5 text-gray-800 border-b pb-3">✏️ แก้ไขข้อมูลแอร์</h2>
            <input type="hidden" id="editId">
            
            <div class="space-y-4">
                <div>
                    <label class="block mb-1 text-sm font-semibold text-gray-700">ชื่อรุ่น</label>
                    <input type="text" id="editModel" class="w-full border border-gray-300 focus:border-blue-500 outline-none p-2.5 rounded-lg bg-gray-50">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 text-sm font-semibold text-gray-700">ราคา (บาท)</label>
                        <input type="text" id="editPrice" class="w-full border border-gray-300 focus:border-blue-500 outline-none p-2.5 rounded-lg">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-semibold text-gray-700">BTU</label>
                        <input type="text" id="editBtu" placeholder="เช่น 9000" class="w-full border border-gray-300 focus:border-blue-500 outline-none p-2.5 rounded-lg">
                    </div>
                </div>
                
                <div>
                    <label class="block mb-1 text-sm font-semibold text-gray-700">ขนาดห้องที่เหมาะสม (ตร.ม.)</label>
                    <input type="text" id="editRoom" placeholder="เช่น 9-14 ตร.ม." class="w-full border border-gray-300 focus:border-blue-500 outline-none p-2.5 rounded-lg">
                </div>
                
                <div>
                    <label class="block mb-1 text-sm font-semibold text-gray-700">ลิงก์รูปภาพจากเว็บ (URL)</label>
                    <input type="text" id="editImg" placeholder="https://..." class="w-full border border-gray-300 focus:border-blue-500 outline-none p-2.5 rounded-lg">
                    <p class="text-xs text-gray-500 mt-1">*คลิกขวาที่รูปบนเว็บที่ต้องการ เลือก Copy image address แล้วนำมาวาง</p>
                </div>
            </div>
            
            <div class="flex justify-end gap-3 mt-8 pt-4 border-t">
                <button onclick="closeModal('editModal')" class="px-5 py-2.5 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 font-semibold transition">ยกเลิก</button>
                <button onclick="saveEdit()" class="px-5 py-2.5 rounded-lg bg-green-500 text-white hover:bg-green-600 font-semibold shadow-lg shadow-green-500/30 transition">💾 บันทึกการเปลี่ยนแปลง</button>
            </div>
        </div>
    </div>

    <script>
        // ข้อมูลดิบเริ่มต้น
        const initialData = [
            { cat: "มิตซู ธรรมดา", items: [ {m: "MS-GY09VF", p: "16,100"}, {m: "MS-GY12VF", p: "19,000"}, {m: "MS-GY18VF", p: "28,000"} ] },
            { cat: "มิตซู Inverter (ใหม่)", items: [ {m: "MSY-KA09", p: "15,600"}, {m: "MSY-KA13", p: "16,000"}, {m: "MSY-KA15", p: "21,400"}, {m: "MSY-KA18", p: "24,200"}, {m: "MSY-KA24", p: "32,000"} ] },
            { cat: "มิตซู Supper Inverter (ใหม่)", items: [ {m: "MSY-GZ09", p: "21,600"}, {m: "MSY-GZ13", p: "25,150"}, {m: "MSY-GZ18", p: "33,000"} ] },
            { cat: "ไดกิ้น ธรรมดา", items: [ {m: "FTM09", p: "15,100"}, {m: "FTM13", p: "17,600"}, {m: "FTM15", p: "20,800"}, {m: "FTM18", p: "25,000"} ] },
            { cat: "ไดกิ้น Inverter", items: [ {m: "FTKB09ZV", p: "13,900"}, {m: "FTKB12ZV", p: "14,500"}, {m: "FTKB15ZV", p: "18,500"}, {m: "FTKB18ZV", p: "19,700"}, {m: "FTKB24ZV", p: "25,000"} ] },
            { cat: "เซ็นทรัลแอร์ ธรรมดา", items: [ {m: "MFE09", p: "-"}, {m: "MFE13", p: "-"}, {m: "MFE18", p: "16,800"}, {m: "MFE25", p: "20,600"}, {m: "2JSFE09", p: "11,600"}, {m: "2JSFE13", p: "12,400"}, {m: "2JSFE18", p: "16,200"}, {m: "2JSFE25", p: "20,000"} ] },
            { cat: "เซ็นทรัลแอร์ Inverter", items: [ {m: "IVM09", p: "11,600"}, {m: "IVM13", p: "12,600"}, {m: "IVM18", p: "16,700"}, {m: "IVM25", p: "20,600"}, {m: "IVJS09", p: "11,600"}, {m: "IVJS13", p: "12,200"}, {m: "IVJS18", p: "16,000"}, {m: "IVJS25", p: "19,900"} ] },
            { cat: "แคเรีย ธรรมดา COPPER TECH S (ใหม่2026)", items: [ {m: "NSAA10", p: "12,800"}, {m: "NSAA13", p: "13,100"}, {m: "NSAA18", p: "17,800"}, {m: "NSAA25", p: "23,100"} ] },
            { cat: "แคเรีย ธรรมดา Copper 7", items: [ {m: "TSAA010", p: "13,800"}, {m: "TSAA013", p: "14,300"}, {m: "TSAA018", p: "20,900"}, {m: "TSAA025", p: "26,500"} ] },
            { cat: "แคเรียน อิน Copper 11 (Wi-Fi)", items: [ {m: "42TVEA010", p: "14,000"}, {m: "42TVEA016", p: "19,100"} ] },
            { cat: "แคเรีย อิน Coper SEAL (ใหม่ 2026)", items: [ {m: "42TVDB010", p: "13,150 รอของเข้า"}, {m: "42TVDB013", p: "13,900 รอของเข้า"}, {m: "42TVDB016", p: "17,800 รอของเข้า"}, {m: "42TVDB018", p: "19,000"}, {m: "42TVDB022", p: "23,800 รอของเข้า"}, {m: "42TVDB026", p: "28,600 รอของเข้า"} ] },
            { cat: "แคเรีย อิน Copper ION Wi-Fi (ใหม่2026)", items: [ {m: "42TVEB10", p: "13,800"}, {m: "42TVEB13", p: "14,600"}, {m: "42TVEB16", p: "18,500"}, {m: "42TVEB18", p: "19,600"}, {m: "42TVEB22", p: "24,500"}, {m: "42TVEB26", p: "29,300"} ] },
            { cat: "ไฮเออร์ ธรรมดา", items: [ {m: "CQRC10", p: "12,100"}, {m: "CQRC13", p: "12,400"}, {m: "CQRC18", p: "17,200"}, {m: "CQRC24", p: "21,100"} ] },
            { cat: "ไฮเออร์ Inverter", items: [ {m: "VQAC09", p: "12,400"}, {m: "VQAC12", p: "12,900"}, {m: "VQAC15", p: "16,100"}, {m: "VQAC18", p: "17,200"}, {m: "VQAC24", p: "21,300"} ] },
            { cat: "Mitsubishi Heavy ธรรมดา", items: [ {m: "CYV10", p: "15,400 รหัสใหม่"}, {m: "CYV13", p: "17,150 รหัสใหม่"}, {m: "CYV15", p: "19,600 รหัสใหม่"}, {m: "CYV18", p: "24,300 รหัสใหม่"}, {m: "CXV24", p: "31,300"} ] },
            { cat: "อิมิเน้น ธรรมดา", items: [ {m: "AFG09F", p: "12,600"}, {m: "AFH12F", p: "13,400"}, {m: "AFH18F", p: "17,800"}, {m: "AFH24F", p: "22,000"} ] },
            { cat: "อิมิเน้น Inverter", items: [ {m: "AVH09", p: "13,000"}, {m: "AVH12", p: "13,500"}, {m: "AVH18", p: "18,000"}, {m: "AVH24", p: "21,900"} ] },
            { cat: "ฮิตาชิ ธรรมดา", items: [ {m: "BJ13", p: "13,300"}, {m: "BJ18", p: "18,500"}, {m: "BJ24", p: "22,800"} ] },
            { cat: "SINCLAIR Inverter", items: [ {m: "SIHC-09", p: "11,100"}, {m: "SIHC-12", p: "11,600"}, {m: "SIHC-18", p: "14,900"}, {m: "SIHC-24", p: "18,400"} ] },
            { cat: "TCL ธรรมดา", items: [ {m: "MFS10", p: "11,700"}, {m: "MFS13", p: "12,600"}, {m: "MFS19", p: "17,400"}, {m: "MFS26", p: "20,800"} ] },
            { cat: "TCL Inverter WiFi", items: [ {m: "T-PROWD10", p: "12,100"}, {m: "T-PROWD13", p: "12,700"}, {m: "T-PROWD19", p: "16,800"}, {m: "T-PROWD25", p: "19,900"} ] },
            { cat: "เอลจี Inverter", items: [ {m: "IBY11", p: "12,700 รหัสใหม่"}, {m: "IBY13", p: "12,900 รหัสใหม่"}, {m: "IKR18", p: "17,400"} ] },
            { cat: "ไมเดีย Inverter", items: [ {m: "MSCE10", p: "10,700"}, {m: "MSCE13", p: "11,400"}, {m: "MSNE19", p: "16,500"}, {m: "MSNE25", p: "20,700"} ] },
            { cat: "AUX Inverter", items: [ {m: "ASW-09/DIM-1S", p: "10,700"}, {m: "ASW-13/DIM-1S", p: "11,800"}, {m: "ASW-18/DIM-1S", p: "14,800"}, {m: "ASW-24/DIM-1S", p: "18,900"} ] },
            { cat: "ซัยโจ ธรรมดา", items: [ {m: "SWG12", p: "11,800 ตัวฟอก"}, {m: "SWG18", p: "15,300"}, {m: "SWG25", p: "19,300"} ] },
            { cat: "แคนดี้ ธรรมดา", items: [ {m: "CE-09PCTF", p: "9,800"}, {m: "CE-12PCTF", p: "10,900"}, {m: "CE-18PCTF", p: "12,500"} ] },
            { cat: "แคนดี้ Inverter", items: [ {m: "CE-09VPCT", p: "รอของเข้า"}, {m: "CE-12VPCT", p: "10,900"}, {m: "CE-18VPCT", p: "12,500"}, {m: "CE-24VPCT", p: "14,400"} ] }
        ];

        let products = [];
        let isAdmin = false;
        let currentBrand = "ทั้งหมด";
        const fallbackImg = "https://images.unsplash.com/photo-1620288627223-53302f4e8c74?q=80&w=600&auto=format&fit=crop"; // รูปแอร์พื้นฐานสวยๆ

        // ฟังก์ชันช่วยดึงชื่อยี่ห้อจาก Category
        function extractBrand(category) {
            if (category.includes('มิตซู') && !category.includes('Heavy')) return 'Mitsubishi';
            if (category.includes('Mitsubishi Heavy')) return 'Mitsubishi Heavy';
            if (category.includes('ไดกิ้น')) return 'Daikin';
            if (category.includes('เซ็นทรัลแอร์')) return 'Central Air';
            if (category.includes('แคเรีย')) return 'Carrier';
            if (category.includes('ไฮเออร์')) return 'Haier';
            if (category.includes('อิมิเน้น')) return 'Eminent';
            if (category.includes('ฮิตาชิ')) return 'Hitachi';
            if (category.includes('SINCLAIR')) return 'Sinclair';
            if (category.includes('TCL')) return 'TCL';
            if (category.includes('เอลจี')) return 'LG';
            if (category.includes('ไมเดีย')) return 'Midea';
            if (category.includes('AUX')) return 'AUX';
            if (category.includes('ซัยโจ')) return 'Saijo Denki';
            if (category.includes('แคนดี้')) return 'Candy';
            return 'อื่นๆ';
        }

        function loadData() {
            let savedData = localStorage.getItem('boonsom_air_data_v2');
            if (savedData) {
                products = JSON.parse(savedData);
            } else {
                let idCounter = 1;
                initialData.forEach(category => {
                    const brandName = extractBrand(category.cat);
                    category.items.forEach(item => {
                        products.push({
                            id: idCounter++,
                            brand: brandName,
                            category: category.cat,
                            model: item.m,
                            price: item.p,
                            btu: "",
                            room: "",
                            img: fallbackImg
                        });
                    });
                });
                saveToLocalStorage();
            }
            renderBrands();
            renderProducts();
        }

        function saveToLocalStorage() {
            localStorage.setItem('boonsom_air_data_v2', JSON.stringify(products));
        }

        // สร้างปุ่มกรองยี่ห้อ
        function renderBrands() {
            const brandContainer = document.getElementById('brand-filters');
            // หายี่ห้อทั้งหมดแบบไม่ซ้ำกัน
            const brands = ["ทั้งหมด", ...new Set(products.map(p => p.brand))];
            
            brandContainer.innerHTML = '';
            brands.forEach(brand => {
                const isActive = brand === currentBrand ? 'active' : 'text-gray-600 border-gray-300 hover:bg-gray-100';
                const btn = document.createElement('button');
                btn.className = `brand-btn whitespace-nowrap px-4 py-1.5 rounded-full border text-sm font-medium transition ${isActive}`;
                btn.innerText = brand;
                btn.onclick = () => {
                    currentBrand = brand;
                    renderBrands(); // วาดปุ่มใหม่เพื่อเปลี่ยนสีปุ่ม active
                    renderProducts(); // อัพเดทสินค้า
                };
                brandContainer.appendChild(btn);
            });
        }

        // แสดงผลสินค้า
        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';

            // กรองตามยี่ห้อที่เลือก
            let filteredProducts = products;
            if (currentBrand !== "ทั้งหมด") {
                filteredProducts = products.filter(p => p.brand === currentBrand);
            }

            // จัดกลุ่มตาม Category ย่อย (เช่น Inverter, ธรรมดา)
            const grouped = filteredProducts.reduce((acc, curr) => {
                if (!acc[curr.category]) acc[curr.category] = [];
                acc[curr.category].push(curr);
                return acc;
            }, {});

            if(Object.keys(grouped).length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400">ไม่พบสินค้าหมวดหมู่นี้</div>`;
                return;
            }

            for (const [category, items] of Object.entries(grouped)) {
                let catHtml = `
                    <div class="col-span-full mt-6 mb-2 flex items-center gap-3">
                        <div class="h-px bg-gray-300 flex-1"></div>
                        <h2 class="text-xl font-bold text-gray-800 bg-white px-4 py-1 border border-gray-200 rounded-full shadow-sm">${category}</h2>
                        <div class="h-px bg-gray-300 flex-1"></div>
                    </div>
                `;
                container.innerHTML += catHtml;

                items.forEach(p => {
                    let isWait = p.price.includes('รอของ');
                    let priceClass = isWait ? 'text-orange-500' : 'text-blue-600';
                    let priceDisplay = isWait ? p.price : `฿${p.price}`;
                    if(p.price === "-") priceDisplay = "สอบถามราคา";

                    let cardHtml = `
                        <div class="bg-white rounded-2xl shadow-[0_2px_15px_-3px_rgba(0,0,0,0.07),0_10px_20px_-2px_rgba(0,0,0,0.04)] overflow-hidden hover:-translate-y-1 hover:shadow-xl transition duration-300 border border-gray-100 group">
                            <div class="relative h-48 overflow-hidden bg-gray-100 flex items-center justify-center p-4">
                                <img src="${p.img}" alt="${p.model}" class="max-h-full max-w-full object-contain group-hover:scale-105 transition duration-500">
                                <div class="absolute top-2 right-2 bg-white/90 backdrop-blur text-xs font-bold px-2 py-1 rounded shadow-sm text-gray-700 border border-gray-100">
                                    ${p.brand}
                                </div>
                            </div>
                            <div class="p-5 relative">
                                <h3 class="text-lg font-bold text-gray-800 line-clamp-1" title="${p.model}">${p.model}</h3>
                                <p class="${priceClass} font-bold text-2xl mt-1 tracking-tight">${priceDisplay}</p>
                                
                                <div class="mt-4 space-y-2">
                                    <div class="flex items-center text-sm text-gray-600 bg-gray-50 p-2 rounded-lg border border-gray-100">
                                        <span class="mr-2">⚡</span>
                                        <span class="flex-1">BTU:</span>
                                        <span class="font-semibold text-gray-800">${p.btu || '-'}</span>
                                    </div>
                                    <div class="flex items-center text-sm text-gray-600 bg-gray-50 p-2 rounded-lg border border-gray-100">
                                        <span class="mr-2">🏠</span>
                                        <span class="flex-1">ขนาดห้อง:</span>
                                        <span class="font-semibold text-gray-800">${p.room || '-'}</span>
                                    </div>
                                </div>
                                
                                ${isAdmin ? `<button onclick="openEditModal(${p.id})" class="mt-5 w-full bg-amber-100 hover:bg-amber-200 text-amber-800 border border-amber-300 py-2 rounded-xl font-semibold transition flex justify-center items-center gap-2"><span>✏️</span> แก้ไขข้อมูล (Admin)</button>` : ''}
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHtml;
                });
            }
        }

        // ระบบ Admin
        function toggleAdmin() {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('adminBtn').innerHTML = "🔒 เข้าสู่ระบบ";
                document.getElementById('adminBtn').classList.replace('bg-red-500', 'bg-white/20');
                renderProducts();
            } else {
                document.getElementById('loginModal').classList.add('active');
                setTimeout(() => document.getElementById('adminPassword').focus(), 100);
            }
        }

        function checkPassword() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === '4321') {
                isAdmin = true;
                document.getElementById('adminBtn').innerHTML = "🔓 ออกจากระบบ";
                document.getElementById('adminBtn').classList.replace('bg-white/20', 'bg-red-500');
                closeModal('loginModal');
                document.getElementById('adminPassword').value = '';
                renderProducts();
            } else {
                alert('รหัสผ่านไม่ถูกต้อง');
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // ทำให้กด Enter ในช่องรหัสผ่านได้
        document.getElementById('adminPassword').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // แก้ไขข้อมูล
        function openEditModal(id) {
            const product = products.find(p => p.id === id);
            if(product) {
                document.getElementById('editId').value = product.id;
                document.getElementById('editModel').value = product.model;
                document.getElementById('editPrice').value = product.price;
                document.getElementById('editBtu').value = product.btu;
                document.getElementById('editRoom').value = product.room;
                document.getElementById('editImg').value = product.img !== fallbackImg ? product.img : '';
                document.getElementById('editModal').classList.add('active');
            }
        }

        function saveEdit() {
            const id = parseInt(document.getElementById('editId').value);
            const index = products.findIndex(p => p.id === id);
            if(index !== -1) {
                products[index].model = document.getElementById('editModel').value;
                products[index].price = document.getElementById('editPrice').value;
                products[index].btu = document.getElementById('editBtu').value;
                products[index].room = document.getElementById('editRoom').value;
                
                const imgInput = document.getElementById('editImg').value;
                products[index].img = imgInput ? imgInput : fallbackImg;
                
                saveToLocalStorage();
                renderProducts();
                closeModal('editModal');
            }
        }

        // เริ่มการทำงาน
        loadData();
    </script>
</body>
</html>
