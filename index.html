<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บุญสมบุญสมแอร์เซอร์วิส | ระบบจัดการข้อมูลแอร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f4f8; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .brand-btn.active { background-color: #1d4ed8; color: white; border-color: #1d4ed8; shadow: 0 4px 10px rgba(29, 78, 216, 0.3); }
        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { transform: translateY(-10px); }
    </style>
</head>
<body class="text-slate-800">

    <div id="loader" class="fixed inset-0 bg-white z-[100] flex flex-col justify-center items-center">
        <div class="animate-spin rounded-full h-14 w-14 border-t-4 border-blue-600 mb-4"></div>
        <p class="text-slate-500 animate-pulse">กำลังเตรียมระบบจัดการแอร์...</p>
    </div>

    <header class="bg-gradient-to-r from-blue-800 to-blue-600 text-white shadow-xl sticky top-0 z-40">
        <div class="container mx-auto px-4 py-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-white p-2 rounded-2xl shadow-lg text-3xl">❄️</div>
                <div>
                    <h1 class="text-xl md:text-2xl font-extrabold tracking-tight">บุญสมบุญสมแอร์</h1>
                    <p class="text-xs text-blue-100 opacity-80">ระบบจัดการหลังบ้าน</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="addBtn" onclick="openAddModal()" class="hidden bg-green-500 hover:bg-green-600 px-4 py-2 rounded-xl text-xs font-bold shadow-lg transition-all active:scale-95">
                    ➕ เพิ่มรุ่นแอร์
                </button>
                <button id="adminBtn" onclick="toggleAdmin()" class="bg-white/10 hover:bg-white/30 backdrop-blur-md px-4 py-2 rounded-xl text-xs font-bold border border-white/20 transition-all active:scale-95">
                    🔒 แอดมิน
                </button>
            </div>
        </div>
    </header>

    <nav class="bg-white/80 backdrop-blur-md shadow-sm border-b sticky top-[84px] z-30">
        <div class="container mx-auto px-2 py-4">
            <div id="brand-filters" class="flex gap-2 overflow-x-auto hide-scrollbar px-2">
                </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10 min-h-screen">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="editModal" class="modal fixed inset-0 bg-slate-900/80 backdrop-blur-md justify-center items-center z-50 p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 id="modalTitle" class="text-2xl font-bold text-slate-800">🛠️ จัดการข้อมูลแอร์</h2>
                <button onclick="closeModal('editModal')" class="text-slate-400 hover:text-slate-600 text-2xl">✕</button>
            </div>
            <input type="hidden" id="editId">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label class="text-xs font-black text-slate-400 uppercase mb-1 block">ยี่ห้อ (Brand)</label>
                    <input type="text" id="editBrand" class="w-full border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-500 outline-none bg-slate-50" placeholder="เช่น Mitsubishi, Daikin">
                </div>
                <div class="md:col-span-2">
                    <label class="text-xs font-black text-slate-400 uppercase mb-1 block">หมวดหมู่ (Category)</label>
                    <input type="text" id="editCategory" class="w-full border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-500 outline-none bg-slate-50" placeholder="เช่น มิตซู ธรรมดา, ไดกิ้น Inverter">
                </div>
                <div class="md:col-span-2">
                    <label class="text-xs font-black text-slate-400 uppercase mb-1 block">ชื่อรุ่น / รหัสสินค้า</label>
                    <input type="text" id="editModel" class="w-full border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-500 outline-none bg-slate-50 font-bold">
                </div>
                <div>
                    <label class="text-xs font-black text-slate-400 uppercase mb-1 block">ราคา (บาท)</label>
                    <input type="text" id="editPrice" class="w-full border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-500 outline-none font-bold">
                </div>
                <div>
                    <label class="text-xs font-black text-slate-400 uppercase mb-1 block">ขนาด BTU</label>
                    <input type="text" id="editBtu" class="w-full border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-500 outline-none" placeholder="เช่น 12,000">
                </div>
                <div class="md:col-span-2">
                    <label class="text-xs font-black text-slate-400 uppercase mb-1 block">ขนาดห้องที่เหมาะสม (ตร.ม.)</label>
                    <input type="text" id="editRoom" class="w-full border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-500 outline-none" placeholder="เช่น 14-18">
                </div>
                <div class="md:col-span-2">
                    <label class="text-xs font-black text-slate-400 uppercase mb-1 block">ลิงก์รูปภาพ (URL)</label>
                    <input type="text" id="editImg" class="w-full border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-500 outline-none text-xs">
                </div>
                <div class="md:col-span-2">
                    <label class="text-xs font-black text-slate-400 uppercase mb-1 block">รายละเอียดเพิ่มเติม / โปรโมชั่น</label>
                    <textarea id="editDetail" rows="2" class="w-full border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-500 outline-none" placeholder="เช่น ประหยัดไฟเบอร์ 5, ฟรีล้างแอร์ 1 ปี..."></textarea>
                </div>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="closeModal('editModal')" class="flex-1 py-4 font-bold text-slate-400">ยกเลิก</button>
                <button id="saveBtn" onclick="saveData()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-700 transition-all active:scale-95">💾 บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal fixed inset-0 bg-slate-900/70 backdrop-blur-sm justify-center items-center z-50 p-4">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-6">ผู้ดูแลระบบ</h2>
            <input type="password" id="adminPassword" class="w-full border-2 border-slate-100 p-4 rounded-2xl mb-6 text-center text-2xl tracking-[0.5em] outline-none focus:border-blue-600" placeholder="••••">
            <button onclick="checkPassword()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">เข้าสู่ระบบ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdnDcProI1UFW2a9eGiUJbLYmI7ihM1XQ",
            authDomain: "boonsomair-3f5b0.firebaseapp.com",
            projectId: "boonsomair-3f5b0",
            storageBucket: "boonsomair-3f5b0.firebasestorage.app",
            messagingSenderId: "831800219771",
            appId: "1:831800219771:web:97243e82b452a14e0a2ade"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let products = [];
        let isAdmin = false;
        let currentBrand = "ทั้งหมด";
        const fallbackImg = "https://images.unsplash.com/photo-1620288627223-53302f4e8c74?q=80&w=600";

        async function loadData() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                products = [];
                querySnapshot.forEach((doc) => { products.push({ id: doc.id, ...doc.data() }); });
                document.getElementById('loader').classList.add('hidden');
                renderBrands();
                renderProducts();
            } catch (e) { console.error(e); }
        }

        function renderBrands() {
            const container = document.getElementById('brand-filters');
            const brands = ["ทั้งหมด", ...new Set(products.map(p => p.brand))];
            container.innerHTML = brands.map(b => `
                <button onclick="window.setBrand('${b}')" class="brand-btn whitespace-nowrap px-8 py-3 rounded-[1.2rem] border-2 font-bold transition-all text-sm ${currentBrand === b ? 'active' : 'bg-white border-slate-100 text-slate-500 hover:bg-slate-100'}">${b}</button>
            `).join('');
        }

        window.setBrand = (brand) => { currentBrand = brand; renderBrands(); renderProducts(); };

        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            let filtered = currentBrand === "ทั้งหมด" ? products : products.filter(p => p.brand === currentBrand);
            
            const grouped = filtered.reduce((acc, curr) => {
                if (!acc[curr.category]) acc[curr.category] = [];
                acc[curr.category].push(curr);
                return acc;
            }, {});

            for (const [category, items] of Object.entries(grouped)) {
                container.innerHTML += `<div class="col-span-full mt-12 mb-6 flex items-center gap-5">
                    <h2 class="text-2xl font-black text-slate-800 tracking-tight">${category}</h2>
                    <div class="h-[2px] flex-grow bg-gradient-to-r from-blue-200 to-transparent"></div>
                </div>`;
                
                items.forEach(p => {
                    let displayImg = p.img || fallbackImg;
                    if (p.img && p.img.startsWith('http') && !p.img.includes('firebasestorage')) {
                        displayImg = `https://wsrv.nl/?url=${encodeURIComponent(p.img)}&w=600&h=450&fit=contain&trim=15&output=webp`;
                    }

                    container.innerHTML += `
                        <div class="product-card bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden flex flex-col group relative">
                            <div class="h-60 bg-slate-50 flex items-center justify-center p-8 relative">
                                <img src="${displayImg}" alt="${p.model}" onerror="this.src='${fallbackImg}'" 
                                     class="max-h-full max-w-full object-contain transition-all duration-700 group-hover:scale-110 mix-blend-multiply">
                                <span class="absolute top-6 left-6 bg-blue-600 text-white px-4 py-1.5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg">${p.brand}</span>
                            </div>
                            <div class="p-8 flex-grow flex flex-col">
                                <h3 class="font-bold text-slate-800 text-lg mb-4 leading-tight min-h-[3rem] line-clamp-2">${p.model}</h3>
                                <div class="grid grid-cols-2 gap-3 mb-6">
                                    <div class="bg-blue-50 p-3 rounded-2xl text-center">
                                        <p class="text-[10px] uppercase font-bold text-blue-400 mb-1">BTU</p>
                                        <p class="text-sm font-black text-blue-700">${p.btu || '-'}</p>
                                    </div>
                                    <div class="bg-emerald-50 p-3 rounded-2xl text-center">
                                        <p class="text-[10px] uppercase font-bold text-emerald-400 mb-1">ตร.ม.</p>
                                        <p class="text-sm font-black text-emerald-700">${p.room || '-'}</p>
                                    </div>
                                </div>
                                <div class="mt-auto flex items-end justify-between">
                                    <p class="text-blue-600 font-black text-3xl tracking-tighter">฿${p.price}</p>
                                    <div class="bg-slate-100 p-3 rounded-2xl text-slate-400">❄️</div>
                                </div>
                            </div>
                            ${isAdmin ? `
                                <div class="px-8 pb-8 flex gap-2">
                                    <button onclick="openEditModal('${p.id}')" class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold text-xs transition-all active:scale-95 shadow-lg">🔧 แก้ไข</button>
                                    <button onclick="deleteProduct('${p.id}')" class="w-12 bg-red-100 text-red-600 py-3 rounded-xl font-bold text-xs transition-all active:scale-95 hover:bg-red-200">🗑️</button>
                                </div>` : ''}
                        </div>`;
                });
            }
        }

        // ระบบเพิ่มข้อมูลใหม่
        window.openAddModal = () => {
            document.getElementById('modalTitle').innerText = "➕ เพิ่มรุ่นแอร์ใหม่";
            document.getElementById('editId').value = "";
            document.getElementById('editBrand').value = "";
            document.getElementById('editCategory').value = "";
            document.getElementById('editModel').value = "";
            document.getElementById('editPrice').value = "";
            document.getElementById('editImg').value = "";
            document.getElementById('editBtu').value = "";
            document.getElementById('editRoom').value = "";
            document.getElementById('editDetail').value = "";
            document.getElementById('editModal').classList.add('active');
        };

        // ระบบแก้ไขข้อมูลเดิม
        window.openEditModal = (id) => {
            const p = products.find(prod => prod.id === id);
            if(p) {
                document.getElementById('modalTitle').innerText = "✏️ แก้ไขข้อมูลแอร์";
                document.getElementById('editId').value = p.id;
                document.getElementById('editBrand').value = p.brand || "";
                document.getElementById('editCategory').value = p.category || "";
                document.getElementById('editModel').value = p.model;
                document.getElementById('editPrice').value = p.price;
                document.getElementById('editImg').value = p.img || '';
                document.getElementById('editBtu').value = p.btu || '';
                document.getElementById('editRoom').value = p.room || '';
                document.getElementById('editDetail').value = p.detail || '';
                document.getElementById('editModal').classList.add('active');
            }
        };

        // ระบบลบข้อมูล
        window.deleteProduct = async (id) => {
            if (confirm('ยืนยันว่าจะลบข้อมูลแอร์รุ่นนี้? (ไม่สามารถกู้คืนได้)')) {
                try {
                    await deleteDoc(doc(db, "products", id));
                    alert('ลบข้อมูลเรียบร้อยแล้ว');
                    loadData();
                } catch (e) { alert('ลบไม่สำเร็จ'); }
            }
        };

        // ระบบบันทึก (ทั้งเพิ่มและแก้ไข)
        window.saveData = async () => {
            const id = document.getElementById('editId').value;
            const btn = document.getElementById('saveBtn');
            const data = {
                brand: document.getElementById('editBrand').value,
                category: document.getElementById('editCategory').value,
                model: document.getElementById('editModel').value,
                price: document.getElementById('editPrice').value,
                img: document.getElementById('editImg').value,
                btu: document.getElementById('editBtu').value,
                room: document.getElementById('editRoom').value,
                detail: document.getElementById('editDetail').value
            };

            if (!data.brand || !data.model || !data.price) return alert("กรุณากรอก ยี่ห้อ, รุ่น และราคา ให้ครบ");

            btn.innerText = "⏳ กำลังบันทึก..."; btn.disabled = true;
            try {
                if (id) {
                    await updateDoc(doc(db, "products", id), data);
                } else {
                    await addDoc(collection(db, "products"), data);
                }
                await loadData(); closeModal('editModal');
            } catch (e) { alert('เกิดข้อผิดพลาด'); }
            finally { btn.innerText = "💾 บันทึกข้อมูล"; btn.disabled = false; }
        };

        window.toggleAdmin = () => isAdmin ? location.reload() : document.getElementById('loginModal').classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        window.checkPassword = () => {
            if(document.getElementById('adminPassword').value === '4321') {
                isAdmin = true; closeModal('loginModal'); 
                document.getElementById('adminBtn').innerText = "🔓 ออกจากระบบ";
                document.getElementById('adminBtn').classList.replace('bg-white/10', 'bg-red-500');
                document.getElementById('addBtn').classList.remove('hidden'); // โชว์ปุ่มเพิ่มแอร์
                renderProducts();
            } else { alert('รหัสผ่านไม่ถูกต้อง!'); }
        };

        loadData();
    </script>
</body>
</html>
