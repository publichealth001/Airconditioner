<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Money Cloud 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS: ดีไซน์พาสเทลมินิมอล ลื่นไหล สไตล์ iOS */
        :root {
            --bg-color: #f7f9fc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --primary: #a8b2ff;
            --income: #b5e48c;
            --expense: #ffb4a2;
            --text-dark: #4a4e69;
            --delete-btn: #ffb4b4;
            --edit-btn: #ffd166;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: var(--text-dark);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 20px;
        }

        .balance-card {
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .balance-amount {
            font-size: 34px;
            font-weight: 600;
            margin: 10px 0 0 0;
        }

        .form-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        #type { flex: 1; }
        #amount { flex: 1.5; }

        input, select {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: #f0f2f5;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, select:focus {
            background: #fff;
            box-shadow: 0 0 0 2px var(--primary);
        }

        #note {
            margin-bottom: 20px;
        }

        /* ส่วนของกลุ่มปุ่มกดบันทึก/แก้ไข */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: var(--primary);
            color: white;
            font-family: 'Prompt', sans-serif;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        button:active { transform: scale(0.95); }

        #cancel-btn {
            background: #cbd5e1;
            color: #64748b;
            display: none; /* ซ่อนไว้ก่อน จะโผล่มาตอนกดแก้ไข */
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h3 { font-size: 18px; }

        #month-filter {
            width: auto;
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .history-list {
            list-style: none;
            max-height: 280px;
            overflow-y: auto;
        }

        .history-list::-webkit-scrollbar { width: 5px; }
        .history-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: white;
            border-radius: 20px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .item.plus { border-left: 6px solid var(--income); }
        .item.minus { border-left: 6px solid var(--expense); }

        .item.fade-out {
            opacity: 0;
            transform: scale(0.9) translateY(-10px);
            margin-bottom: -50px;
            padding-top: 0;
            padding-bottom: 0;
            height: 0;
            overflow: hidden;
        }

        .item-details {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding-right: 10px;
        }

        .item-note { word-break: break-word; font-weight: 400; }
        .item-date { font-size: 11px; color: #a0a5ba; margin-top: 2px; }
        .item-right { display: flex; align-items: center; gap: 8px; }
        .item-amount { font-weight: 600; white-space: nowrap; margin-right: 4px; }

        /* ปุ่มจัดการรายการประวัติ */
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            width: auto;
        }
        
        .action-btn:active { transform: scale(0.8); }
        .delete-btn-icon { color: var(--delete-btn); }
        .delete-btn-icon:hover { color: #ff5c5c; }
        .edit-btn-icon { color: #cbd5e1; }
        .edit-btn-icon:hover { color: #94a3b8; }

        .no-data { text-align: center; color: #a0a5ba; padding: 20px; font-size: 14px; }

        /* 🔔 สไตล์กล่องแจ้งเตือน Toast แจ้งเตือนสุดล้ำ */
        .toast-container {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 14px 28px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 15px;
            z-index: 9999;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .toast-container.show {
            top: 25px;
            opacity: 1;
        }

        .toast-success { border-left: 5px solid var(--income); color: #52793d; }
        .toast-info { border-left: 5px solid var(--primary); color: #5b65b3; }
        .toast-delete { border-left: 5px solid var(--expense); color: #c26753; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media screen and (max-width: 480px) {
            .container { padding: 25px 20px; border-radius: 30px; }
            .balance-amount { font-size: 28px; }
            .form-group { flex-direction: column; gap: 10px; }
            #type, #amount { width: 100%; }
            input, select, button { padding: 14px; font-size: 15px; }
            .item { padding: 14px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast-container">
        <span id="toast-icon">✨</span>
        <span id="toast-text">ทำรายการสำเร็จ!</span>
    </div>

    <div class="container">
        <h1>My Money Cloud 💸</h1>
        
        <div class="balance-card">
            <div id="balance-title">ยอดเงินคงเหลือ (ทั้งหมด)</div>
            <div class="balance-amount" id="balance">฿0.00</div>
        </div>

        <form id="transaction-form">
            <div class="form-group">
                <select id="type">
                    <option value="minus">รายจ่าย 📤</option>
                    <option value="plus">รายรับ 📥</option>
                </select>
                <input type="number" id="amount" placeholder="จำนวนเงิน" required min="1" step="any">
            </div>
            
            <input type="text" id="note" list="note-suggestions" placeholder="จดไว้หน่อยว่าค่าอะไร..." required autocomplete="off">
            <datalist id="note-suggestions"></datalist>

            <div class="btn-group">
                <button type="submit" id="submit-btn">บันทึกข้อมูล ✨</button>
                <button type="button" id="cancel-btn">ยกเลิก ❌</button>
            </div>
        </form>

        <div class="history-header">
            <h3>ประวัติรายการ</h3>
            <select id="month-filter">
                <option value="all">ทั้งหมด 📅</option>
            </select>
        </div>

        <ul class="history-list" id="list">
            <div class="no-data">กำลังเชื่อมต่อคลาวด์... 🚀</div>
        </ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // คอนฟิกูเรชันโปรเจกต์ของคุณ boonsomair-3f5b0
        const firebaseConfig = {
            apiKey: "AIzaSyAdnDcProI1UFW2a9eGiUJbLYmI7ihM1XQ",
            authDomain: "boonsomair-3f5b0.firebaseapp.com",
            projectId: "boonsomair-3f5b0",
            storageBucket: "boonsomair-3f5b0.firebasestorage.app",
            messagingSenderId: "831800219771",
            appId: "1:831800219771:web:97243e82b452a14e0a2ade"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const transactionsRef = collection(db, "transactions");

        const form = document.getElementById('transaction-form');
        const balanceDisplay = document.getElementById('balance');
        const balanceTitle = document.getElementById('balance-title');
        const list = document.getElementById('list');
        const datalist = document.getElementById('note-suggestions');
        const monthFilter = document.getElementById('month-filter');
        
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const toast = document.getElementById('toast');

        let transactions = [];
        let editId = null; // ไว้เก็บ ID ไอเทมที่กำลังแก้ไขอยู่ (ถ้าเป็น null แปลว่าโหมดบันทึกปกติ)

        const defaultSuggestions = [
            "ชาไข่มุก 🧋", "หมูกระทะ 🥓", "ค่าเดินทาง 🚝", 
            "ช้อปปิ้ง 🛍️", "ค่าเน็ต/โทรศัพท์ 📱", "เงินเดือน 💰", 
            "ขนมจุกจิก 🍫", "กาแฟ ☕", "โอนให้เพื่อน 💸"
        ];

        // 🔔 ฟังก์ชันเรียกโชว์หน้าต่างแจ้งเตือนสุดคิวท์
        function showToast(text, type = 'success') {
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');
            
            toastText.innerText = text;
            toast.className = "toast-container show"; // รีเซ็ตคลาสรีรันการโชว์
            
            if (type === 'success') {
                toast.classList.add('toast-success');
                toastIcon.innerText = '🎉';
            } else if (type === 'info') {
                toast.classList.add('toast-info');
                toastIcon.innerText = '🛠️';
            } else if (type === 'delete') {
                toast.classList.add('toast-delete');
                toastIcon.innerText = '🗑️';
            }

            // แสดงผล 2.5 วินาทีแล้วค่อยๆ เก็บตัวกลับขึ้นไปด้านบน
            setTimeout(() => {
                toast.classList.remove('show');
            }, 250);
        }

        function updateSuggestions() {
            datalist.innerHTML = '';
            const pastNotes = transactions.map(t => t.note);
            const allSuggestions = [...new Set([...defaultSuggestions, ...pastNotes])];
            allSuggestions.forEach(note => {
                const option = document.createElement('option');
                option.value = note;
                datalist.appendChild(option);
            });
        }

        function updateMonthFilterOptions() {
            const currentSelection = monthFilter.value;
            monthFilter.innerHTML = '<option value="all">ทั้งหมด 📅</option>';
            
            const months = transactions.map(t => {
                const d = new Date(t.date);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            });
            const uniqueMonths = [...new Set(months)].sort().reverse();

            uniqueMonths.forEach(m => {
                const [year, month] = m.split('-');
                const dateObj = new Date(year, month - 1);
                const monthName = dateObj.toLocaleDateString('th-TH', { month: 'short', year: 'numeric' });
                
                const option = document.createElement('option');
                option.value = m;
                option.innerText = monthName;
                monthFilter.appendChild(option);
            });

            if ([...monthFilter.options].some(o => o.value === currentSelection)) {
                monthFilter.value = currentSelection;
            } else {
                monthFilter.value = 'all';
            }
        }

        function updateUI() {
            list.innerHTML = '';
            let total = 0;
            const selectedMonth = monthFilter.value;

            const filteredTransactions = transactions.filter(t => {
                if (selectedMonth === 'all') return true;
                const d = new Date(t.date);
                const itemMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                return itemMonth === selectedMonth;
            });

            if (filteredTransactions.length === 0) {
                list.innerHTML = '<div class="no-data">ไม่มีรายการของเดือนนี้ 🍩</div>';
            }

            filteredTransactions.forEach(t => {
                if (t.type === 'plus') total += t.amount;
                else total -= t.amount;

                const d = new Date(t.date);
                const formattedDate = d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' });

                const li = document.createElement('li');
                li.classList.add('item', t.type);
                li.setAttribute('data-id', t.id); 
                li.innerHTML = `
                    <div class="item-details">
                        <span class="item-note">${t.note}</span>
                        <span class="item-date">${formattedDate}</span>
                    </div>
                    <div class="item-right">
                        <span class="item-amount" style="color: ${t.type === 'plus' ? '#7cb55e' : '#e07a64'};">
                            ${t.type === 'plus' ? '+' : '-'}฿${t.amount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                        </span>
                        <button class="action-btn edit-btn-icon" data-edit-id="${t.id}">✏️</button>
                        <button class="action-btn delete-btn-icon" data-delete-id="${t.id}">🗑️</button>
                    </div>
                `;
                list.appendChild(li);
            });

            // ผูกเหตุการณ์ให้ปุ่มลบ
            document.querySelectorAll('.delete-btn-icon').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-delete-id');
                    deleteTransaction(id);
                });
            });

            // ผูกเหตุการณ์ให้ปุ่มแก้ไข
            document.querySelectorAll('.edit-btn-icon').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-edit-id');
                    startEdit(id);
                });
            });

            if (selectedMonth === 'all') {
                balanceTitle.innerText = "ยอดเงินคงเหลือ (ทั้งหมด)";
            } else {
                const [year, month] = selectedMonth.split('-');
                const monthName = new Date(year, month - 1).toLocaleDateString('th-TH', { month: 'long' });
                balanceTitle.innerText = `ยอดรวมเฉพาะเดือน (${monthName})`;
            }

            balanceDisplay.innerText = `฿${total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            updateSuggestions();
        }

        // เข้าสู่โหมดแก้ไขข้อมูล
        function startEdit(id) {
            const target = transactions.find(t => t.id === id);
            if (!target) return;

            editId = id; // ล็อก ID ที่จะแก้ไข
            document.getElementById('type').value = target.type;
            document.getElementById('amount').value = target.amount;
            document.getElementById('note').value = target.note;

            // แปลงร่างปุ่มกดยืนยันให้ชัดเจนขึ้น
            submitBtn.innerText = "อัปเดตข้อมูล 🛠️";
            submitBtn.style.background = "#ffd166"; // เปลี่ยนเป็นสีส้ม/เหลือง
            cancelBtn.style.display = "block"; // เปิดปุ่มยกเลิกตัวเลือกขึ้นมา
            
            document.getElementById('amount').focus(); // เลื่อนโฟกัสไปช่องกรอกเงินทันที
        }

        // ยกเลิกโหมดแก้ไข ล้างค่าฟอร์มกลับเป็นปกติ
        function resetFormState() {
            editId = null;
            form.reset();
            submitBtn.innerText = "บันทึกข้อมูล ✨";
            submitBtn.style.background = "var(--primary)";
            cancelBtn.style.display = "none";
        }

        cancelBtn.addEventListener('click', resetFormState);

        // ฟังก์ชันลบรายการแบบมีแอนิเมชัน
        async function deleteTransaction(id) {
            const itemElement = document.querySelector(`[data-id="${id}"]`);
            if (itemElement) {
                itemElement.classList.add('fade-out');
                setTimeout(async () => {
                    try {
                        await deleteDoc(doc(db, "transactions", id));
                        showToast("ลบรายการเรียบร้อยแล้ว", "delete");
                        if (editId === id) resetFormState(); // หากกำลังแก้รายการนี้อยู่แล้วกดลบ ให้ล้างฟอร์มด้วย
                    } catch (error) {
                        console.error("Error deleting document: ", error);
                    }
                }, 300);
            }
        }

        // ฟังการอัปเดตแบบเรียลไทม์จาก Firebase
        const q = query(transactionsRef, orderBy("date", "desc"));
        onSnapshot(q, (snapshot) => {
            transactions = [];
            snapshot.forEach((doc) => {
                transactions.push({ id: doc.id, ...doc.data() });
            });
            updateMonthFilterOptions();
            updateUI();
        });

        // เมื่อกดส่งฟอร์ม (ทั้งบันทึกใหม่ หรือ อัปเดตของเก่า)
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const type = document.getElementById('type').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const note = document.getElementById('note').value;

            try {
                if (editId) {
                    // 🛠️ โหมดอัปเดตข้อมูลเดิมบน Firebase
                    const docRef = doc(db, "transactions", editId);
                    await updateDoc(docRef, {
                        type,
                        amount,
                        note
                        // เก็บวันที่เดิมไว้ ไม่เปลี่ยนเพื่อคงตำแหน่งและเดือนเดิม
                    });
                    showToast("อัปเดตรายการเรียบร้อย! 💖", "info");
                    resetFormState();
                } else {
                    // ✨ โหมดบันทึกรายการใหม่แกะกล่อง
                    await addDoc(transactionsRef, {
                        type,
                        amount,
                        note,
                        date: new Date().toISOString()
                    });
                    showToast("บันทึกข้อมูลสำเร็จเรียบร้อยแล้ว!", "success");
                    form.reset();
                }
            } catch (error) {
                console.error("Error writing document: ", error);
                alert("เกิดข้อผิดพลาดในการติดต่อกับ Firebase!");
            }
        });

        monthFilter.addEventListener('change', updateUI);
    </script>
</body>
</html>
